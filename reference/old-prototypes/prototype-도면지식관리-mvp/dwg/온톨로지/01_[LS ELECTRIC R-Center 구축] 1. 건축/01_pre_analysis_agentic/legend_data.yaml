line_types:
- style: 실선
  meaning: 도면 표기방법 예시의 기본 선
- style: 점선
  meaning: 상세범위가 넓을때 / 상세범위가 좁을때 예시에 사용됨
- style: 파선
  meaning: 상세범위 예시에서 사용된 선형
- style: 굵은 실선
  meaning: 범례 내 표기 예시의 외곽선 및 구획선에 사용됨
notes:
- 도면 표기 부호 표에서 '도면 TITLE' 예시로 'A 5층 평면도'가 표시됨.
- '도면 표기 부호 표에서 ''SCALE: 1/1''이 표시됨.'
- 일반약어 표에는 좌우 2열로 약어와 풀네임이 병기되어 있음.
- 이미지에서 식별 가능한 약어만 추출했으며, 일부 항목은 원문 판독이 불명확하여 null 또는 UNKNOWN으로 유지함.
