executive_summary:
  drawing_number: A04.03
  title: 확대평면도-3 (지상2층, 옥탑)
  classification: FLOOR_LAYOUT
  discipline: ARCHITECTURAL
  confidence: 0.96
  summary: '지상2층 확대평면도와 옥탑 확대평면도가 함께 배치된 건축 평면도이다.

    주요 공간은 Software Lab, 자료실, 검증시스템 컨트롤실, 세미나/다목적실, 소회의실, 사무실, 복도, 화장실, EPS/TPS, PS,
    중층 조망공간으로 확인된다.

    주요 표기는 오픈트렌치(W=300), EXPANSION JOINT @6,000x6,000, CONTROL JOINT @6,000x6,000,
    CAGED LADDER, Ø125/Ø100 R.D, Ø150 SST 선홈통, Ø100 SST 횡주관, 장비패드(H:200), SLOPE이며,
    층고 표기는 GL±0=EL+94.00, 1FL±0=EL+94.20, 2FL±0=1FL+5,500=EL+99.70, RFL±0=1FL+10,000=EL+104.20로
    보인다.

    '
