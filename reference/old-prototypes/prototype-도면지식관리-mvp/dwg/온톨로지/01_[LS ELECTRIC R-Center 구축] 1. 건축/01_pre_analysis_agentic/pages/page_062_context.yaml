- 도면 제목란에 '확대평면도-3 (지상2층, 옥탑)'가 보임.
- 좌측 도면과 우측 도면이 각각 1, 2로 구분되어 있음.
- 범례에 있는 심볼 중 축척 bubble, 단면 marking, 상세 범위 표시가 시각적으로 확인됨.
- 범례에 없는 것으로 보이는 추가 표기는 다수의 실명/설비/치수 텍스트이며, 이는 심볼이라기보다 도면 주석으로 보임.
- '기존 텍스트 분석에서 확인된 공간명: Software Lab, 자료실, 검증시스템 컨트롤실, 세미나/다목적실, 소회의실-1, 소회의실-2, 센터장실,
  사무실, 복도, 휴게공간, OA/탕비실, 중회의실, 여자화장실, 남자화장실, 계단실, EPS/TPS, PS, 중층 조망공간, 오픈트렌치(W=300),
  EXPANSION JOINT @6,000x6,000, CONTROL JOINT @6,000x6,000, CAGED LADDER, Ø125 R.D
  (3EA), Ø100 R.D (2EA), Ø150 SST 선홈통, Ø100 SST 횡주관, 장비패드(H:200), SLOPE, 냉장고.'
- 범례 확인 페이지는 4로 기록됨.
