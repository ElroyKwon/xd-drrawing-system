  drawing_texts:
  - source: page 61
    page_number: 61
    text: 로비, 방풍실, 계단실, 장애인화장실, 고객 대기실, 고객 접견실, 설비보전실, Drive/전기적 기능시험실이 함께 표시되며, PS
      및 EPS/TPS 샤프트 표기가 확인된다.
  - source: page 63
    page_number: 63
    text: 계단실 확대평면도
  - source: page 63
    page_number: 63
    text: LS Electric R-Center 구축 프로젝트의 계단실 확대평면도로, 1층/2층/옥탑층/옥탑지붕의 확대평면이 한 페이지에 배치되어
      있다.
  - source: page 63
    page_number: 63
    text: 계단실 T01을 중심으로 로비, 화장실, Software Lab, 중층 조망공간과 계단 방향(UP/DN), 그리드(B1, B2,
      5, 5A, 5B)가 함께 표기된다.
