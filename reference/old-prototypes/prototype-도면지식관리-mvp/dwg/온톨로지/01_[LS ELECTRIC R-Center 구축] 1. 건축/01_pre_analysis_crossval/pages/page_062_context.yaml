executive_summary:
  drawing_number: A04.03
  title: 확대평면도-3 (지상2층, 옥탑)
  classification: FLOOR_LAYOUT
  discipline: ARCHITECTURAL
  confidence: 0.95
  summary: '지상2층 확대평면도와 옥탑 확대평면도가 한 페이지에 함께 배치된 건축 평면도이다.

    2층에는 Software Lab, 자료실, 검증시스템 컨트롤실, 세미나/다목적실, 소회의실, 센터장실, 사무실, 복도, 휴게공간, OA/탕비실,
    중회의실, 화장실, 계단실, EPS/TPS, PS가 확인된다.

    옥탑에는 오픈트렌치, CAGED LADDER, EXPANSION JOINT @6,000x6,000, CONTROL JOINT @6,000x6,000,
    장비패드(H:200), 배수/배관 표기(Ø125 R.D (3EA), Ø100 SST 횡주관, Ø150 SST 선홈통, Ø100 R.D (2EA))와
    레벨 표기(FH, RFL, RSFL, RFSL, 2FL)가 확인된다.

    '
