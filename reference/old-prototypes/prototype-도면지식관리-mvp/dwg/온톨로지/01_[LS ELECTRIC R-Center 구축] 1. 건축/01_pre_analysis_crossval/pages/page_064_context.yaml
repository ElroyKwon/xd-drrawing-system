executive_summary:
  drawing_number: A05.02
  title: 계단실 확대단면도
  classification: DETAIL_DRAWING
  discipline: ARCHITECTURAL
  confidence: 0.99
  summary: 'LS Electric / R-Center 구축 프로젝트의 건축 상세 도면으로, 계단실 확대단면도-1과 -2가 함께 표시된다.

    계단실, 로비, 복도, 장애인화장실(남/여), 청소도구실과 PIT가 보이며, 양개형 접이식 방화문과 강화유리, 루프드레인(Ø100 R.D 2EA),
    거터(300X250)가 확인된다.

    THK236 글라스울 지붕판넬, THK135/125/123 글라스울 판넬, THK150 압출법 보온판(특호), THK100 무근콘크리트 기계미장,
    THK60 버림 콘크리트, THK0.1 PE 필름, 고무아스팔트 복합방수, 침투식 방수, THK10 방수층보호재 등의 자재 사양이 표기된다.

    '
