  summary: '지상2층 확대평면도와 옥탑 확대평면도가 함께 있는 복합 건축 평면도이다.

    주요 공간은 Software Lab, 자료실, 검증시스템 컨트롤실, 세미나/다목적실, 소회의실, 센터장실, 사무실, 복도, 휴게공간, OA/탕비실,
