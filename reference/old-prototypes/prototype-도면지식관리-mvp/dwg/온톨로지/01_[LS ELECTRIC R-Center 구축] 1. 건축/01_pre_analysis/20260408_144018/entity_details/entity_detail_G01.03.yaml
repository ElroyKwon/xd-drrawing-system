  drawing_texts:
  - source: page 4
    page_number: 4
    text: '본 페이지는 건축 일반사항/설계기준/내화피복/내부마감/간막이벽 공사/천장/단열 등의 텍스트 중심 시트이며, 우측에 도면 표기 부호와
      일반약어 표가 배치되어 있다.


      실제 설비 배치도나 연결 관계는 보이지 않으며, 약어 표에서 A.H.U, ELEV, F.D, R.D, P.S 등 설비·공간 관련 태그가
      식별된다.


      제목란에는 도면번호 G01.03과 제목 건축일반사항이 보이고, LS Electric 로고 및 R-Center 구축 표기가 확인된다.'
