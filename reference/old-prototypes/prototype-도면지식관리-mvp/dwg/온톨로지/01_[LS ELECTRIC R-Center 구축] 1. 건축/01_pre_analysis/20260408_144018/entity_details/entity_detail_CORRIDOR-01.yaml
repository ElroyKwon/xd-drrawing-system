  - source: page 64 executive_summary
    page_number: 64
    text: '계단실 확대단면도 페이지로, 계단실 확대단면도-1과 -2 두 개의 상세 단면이 한 페이지에 배치되어 있다.


      주요 공간은 계단실, 로비, 복도, 장애인화장실(남/여), 청소도구실, PIT이며, 방화문과 강화유리, 각종 판넬/단열/방수 재료 표기가
      함께 보인다.


      레벨 표기는 GL+14,200, GL+13,500, GL+10,000, GL+5,700, GL+200, GL-2,500이 확인되며, 별도
      설비 계통도는 보이지 않는다.'
