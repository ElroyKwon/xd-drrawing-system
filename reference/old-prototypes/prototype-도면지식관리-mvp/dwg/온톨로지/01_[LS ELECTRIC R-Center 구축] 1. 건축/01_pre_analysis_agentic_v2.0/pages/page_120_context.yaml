    shape: rectangle
    labels_inside:
    - ■ 기밀 및 결로방지를 위한 조치
    - 가. 벽체 내표면 및 내부에서의 결로를 방지하고 단열재의 성능 저하를 방지하기 위하여 제2조에 의하여 단열조치를 하여야 하는 부위(창 및
      문과 난방공간 사이의 공간 바닥 제외)에는 제5조제5호카목에 따른 방습층을 설치하여야 한다.
    - 나. 방습층 및 단열재가 이어지는 부위 및 단부는 이음 및 단부를 통한 투습을 방지할 수 있도록 다음과 같이 조치를 하여야 한다.
    - (1) 단열재는 이음부는 최대한 밀착하여 시공하거나, 2겹 엇갈리게 시공하여 이음부를 통한 단열성능 저하가 최소화 될 수 있도록 조치할
      것.
    - (2) 방습층으로 알루미늄박 또는 플라스틱계 필름 등을 사용할 경우의 이음부는 100mm 이상 중첩하고, 내습성 테이프, 접착제품으로 기밀하게
      마감할 것.
    - (3) 단열재가 만나는 모서리 부위는 방습층 및 단열재가 이어질 경우 이음부를 통한 단열성능 저하가 최소화 되도록 하여 알루미늄박 또는
      플라스틱계 필름을 사용할 경우 위 모서리 이음부는 150mm 이상 중첩되게 시공하고, 단습성 테이프, 접착제품으로 기밀하게 마감할 것.
    - (4) 방습층의 단부는 단부를 통한 투습이 발생하지 않도록 내습성 테이프, 접착제품으로 기밀하게 마감할 것.
    - 다. 건축물 외피 단열부위의 접합부, 틈 등은 밀폐될 수 있도록 코킹과 가스켓 등을 사용하여 기밀하게 처리하여야 한다.
