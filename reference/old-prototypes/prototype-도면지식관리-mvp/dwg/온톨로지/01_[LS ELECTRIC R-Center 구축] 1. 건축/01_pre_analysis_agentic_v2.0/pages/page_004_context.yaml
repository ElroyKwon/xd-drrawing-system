      building_name: 공통
      drawn_by: 이 다 슬
      checked_by_1: 안 동 식
      checked_by_2: 이 운 진
      approved_by: 정 용 재
      title_block_notes: 실시설계 도서 제출
      title_block_issue_date: 24.05.17
    position: right-bottom
    source_block: both
  - tag: UNKNOWN-PANEL-01
    name: 건축 일반사항 본문
    discipline: ARCHITECTURAL
    function_category: GENERAL_NOTES
    specifications:
      sections:
      - 일반사항
      - 치 수
      - 설계기준
      - 내화피복
      - 내부마감
      - 유리공사 시공
      - 천 장
      - 단 열
      - 기 타
      notes:
      - 본 공사에 관련된 모든 사항은 건축법 및 해당 관련 규정에 따르며, 사용되는 건설재료는 KS규격품 및 동등이상으로 한다.
      - 건축공사 이외의 사항과 공사간의 코디네이션을 위하여는 구조, HVAC, 설비, 소방, 전기(통신)설비 등 관련 도면을 참조한다.
      - 시공자는 공사착수 전에 대지측량을 시행하여 건축주에게 제공 대지측량도의 정확도에 대하여 재확인 해야한다.
      - 시공자는 모든 설계도면의 치수, 확인사항을 지키며, 도면조정이 필요한 조건에 대하여는 관련공사 착수이전에 감리자에게 서면으로 통보하여야
        한다.
      - 시공자는 A항에 명시된 바에 따라 건물의 위치 및 LEVEL을 정확하게 배치할 책임을 가진다.
      - 도면에 표기된 상세는 설계의도, 디자인의 형태와 타입을 명시하는 것으로서, 시공자는 이를 기준으로 필요한 기술검토를 거쳐 시공상세도를
        작성하여 감리자, 건축주에게 승인을 득한 후 시공 하여야한다.
      - 시공자가 임의로 결정할 수 없는 특정 치수, 디테일 및 디자인 의도 등은 관련작업 착수 이전에 감리자, 건축주와 협의하여야한다.
      - 잦은 설계변경으로인해 도면간의 내용이 서로 상이한 경우에는 시공자는 반드시 감리자와 협의하여 감리자의 승인을 득한 후 시공하여야한다.
      - 별도의 명기가 없는 한 도면의 모든 치수는 밀리미터(mm)를 사용하며 배치도의 등고치수(GRADE ELEVATIONS)는 미터(m)를
        사용한다.
      - 치수는 표기된 치수만이 유효하며, 스케일 자(尺)로 측정한 치수는 유효하지 아니하다.
      - 모든 치수들은 관련작업이 진행되기 이전에 현장에서 확인되어야 하며, 치수가 상이하지 않을 경우 감리자, 건축주에게 통보하여야 한다.
      - 정확한 내부치수의 확보가 필요한 곳(벽과 벽사이(벽/공간), 설비관련 샤프트, 공동구 등)은 도면에 실(實) 스케일 개념을 기준으로
        치수를 표기하고, 그외의 벽은 칸막이벽은 중심선을 기준으로 한다.
      - 별도의 명기가 없는 한 창호 및 문 위치는 인접한 벽과 만나는 문틀의 디자인에 따른다.
      - 평면도, 입면도및 단면도에 표기된 바닥기준은 각층 바닥마감 상단을 기준으로한다. (단, 최상층 지붕 바닥기준은 바닥구조상부를 기준)
      - 건물 외벽과 내부공사에 필요한 설계하중 및 성능조건은 설계설명서(PROJECT DESCRIPTION) 및 관련 시방서를 참조한다.
      - 외벽, 커튼월 및 CLADDING 공사는 모든 부재의 진동, 캐노피등 건물에서 돌출된 부분등은 관련법규 및 풍동실험에 의하여 결정된
        풍압을 근거로하여 설계한다.
      - 천창, 캐노피, 건물의 돌출된 부위 등은 설해에 대한 하중을 근거로하여 설계한다.
      - 지붕과 테라스, 발코니의 등의 누름돌(BALLAST)은 관련법규와 풍동실험에 의하여 결정된 하중의 1.5배 이상을 근거로하여 결정한다.
      - 옥상부위의 지붕, 천창, 캐노피및 외벽의 설계에는 적설하중및 상기의 풍압을 고려한다.
      - 건물외벽의 설계는 외벽청소시스템의 하중조건에 적합해야 한다.
      - 모든 바닥의 마감재는 각기 콘크리트에는 W6-150x150을 보강하며 시공하며 @3,000 마다 신축줄눈을 설치할 것.
      - 주차장경사로로 마감이 구성되는 경우, 스틸파이프를 적용할 것.
      - 도면에 표기된 사항이외에 대하여는 콘크리트 관련시방서를 참조한다.
      - 모든의 관련사항은 본 특기시방의 "이음과 정착"을 참조한다.
      - 구조 관련사항은 구조 도면을 참조한다.
      - 바닥에 설치하는 모든 장비의 하부에는 100mm 높이이상의 콘크리트 패드를 설치하여야하며 콘크리트 패드는 WWF-6x6/W4xW4로
        보강한다.
      - 모든 기계, 배관, 전기설비실과 비상 발전기주위의 주위에는 150mm 높이의 콘크리트 턱을 설치한다.
      - 슬라브 주위는 콘크리트 타설으로 구조슬래브에 고정시켜야한다.
      - 건물 전체의 고정 수평케이블 선로와 수직승강설비, 변압실은 콘크리트로 분리구획 되어야한다.
      - 구조 슬래브의 험프및 콘크리트, 기둥 피복콘크리트, 장비 패드및 콘크리트 턱은 다음타입을 표준으로 한다.
      - 내부콘크리트 - 보통콘크리트
      - 외부에 영구적으로 노출되는 콘크리트 - AIR-ENTRAINED 조강콘크리트
      - 구조 슬래브의 험프및 콘크리트 - 철근 배근
      - 건축, 구조도면 상의 파라펫과 방수턱은 구조물에 철근으로 정착, 보강한다.
      - 모든 콘크리트 블럭은 프리스트레스 방법(ASTM E447)에 따른 1,000PSI 이상의 압축강도를 가진다.
      - 모든 수직 보강철근의 이음은 겹침이음으로 하고 겹침길이는 48D로 한다.
      - 모든 벽의 교차점은 블럭매쉬로 수평보강하고 엇물려 쌓기로 한다.
      - 내력벽은 도면 표기와 같이 구조체에 연결하고 힘력을 구조체에 전달할 수 있도록 한다.
      - 시공자는 콘크리트 블럭 벽의 모든 CONTROL JOINT와 구조와 위치를 도면으로 작성하여 감리자, 건축주에게 제출하여야 한다.
      - 모든 조적벽은 천정 위로 올려 쌓아야하며, 조적자재와 그라우트가 설계 강도의 75%이상 도달할 때까지, 그리고 상부 플랜 양생이 완전히
        설치될 때까지 측면 지지대에 고정되어야 한다.
      - 쌓기방법과 마감은 도면 표기 대로 시공한다.
      - 2.0m 폭 이하의 개구부에는 보강 인방(LINTEL)블럭 쌓기로 한다.
      - 도면 이외의 사항은 관련 시방서를 참조한다.
      - 외부에 사용하는 철재는 도금 전에 용융도금(HOT-DIP GALVANIZED) 처리하여야 한다.
      - 외부 커튼월과 슬래브의 단부사이에는 THK 3mm 이상의 아연도 철판으로 막아야 한다.
      - 커튼월 의 SILL과 CLOSURE 철판의 구조는 슬래브 높이의 오차를 보정할 수 있게 설계되어야하며 철판은 슬래브에 최대 600mm
        간격으로 앵커하여야 한다.
      - 방수관련 사항은 시방서를 참조한다.
      - 방수보호층의 두께는 평균이 설정값핑의 바탕이 들어올리는 압력을 고려해야 한다.
      - 방수보호층의 위치와 타입, 지붕층 마감면의 높이는 도면을 참조한다.
      - 벽, 기둥, 보 또는 지붕에서는 통상 화재시의 가열에 대하여 다음표에 정하는 시간 이상을 견딜 수 있는 성능을 가진것이어야 한다.
      - 건축물의 부분별 층수가 상이할 경우, 부분별 최고높이 또는 최고층수로서 당해 용도 규모에 따라 상기표에서 제시한 부위별 내화시간에 따른다.
      - 건축물의 벽, 기둥, 바닥, 보 또는 지붕을 구성하는 주요건축재료 또는 건축 부재는 한국산업규격 표시품(KS)을 사용하여야하며, 한국공업규격
        표시품이 없는 경우에는 국토건설시험소장이 인정하는 것이어야 한다.
      - 덕트나 배관 또는 이와 유사한 상황으로 생기는 바닥슬라브의 모든 개구부는 슬라브구조에서 요구되는 내화시간이 지켜질 수 있도록 승인된
        자재로 밀폐시공 하여야 한다.
      - 모든 내부에 노출되는 에폭시스틸재는 1시간 내화성능의 두께와 밀도를 가진 내화피복을 하여야 한다.
      - 내화피복재료는 내화페인트를 적용한다.
      - 타일이 아닌 바닥에는 도면에 따라 컨트롤조인트를 설치한다.
      - 글라스월, 칸막이벽이 벽과 천장운 도면에 따라 컨트롤조인트를 설치한다.
      - 모든 조적조의 벽과 글라스월 판넬, SPG는 특기가 없는한 바닥에서 상부구조재 하부마감까지 설치해야 한다.
      - 모든 칸막이벽의 변형은 스팬의 최대길이의 1/240까지로 제한한다.
      - 모든 유리창호 주위는 내,외부에 적용하는 SEALANT의 특성에 맞아야 한다.
      - 외벽의 내부벽마감 화장실, 청소도구실, 탕비실등 습한부분의 천장은 방수석고보드를 사용해야 한다.
      - 벽 진동, 공기전달, 배관등을 위한 벽의 관통위치와 크기는 설비와 사전협의 되어야 한다.
      - 소음 통제(STC치가 기록된 벽등으로 지정)모든 관통 부분에 대해서는 상단, 하단, 모서리 부분에 흡음 실란트/방음마개로 방음실란트)로
        기밀하게 채워야 한다.
      - 시공자는 조명기구, 디퓨져, 스피커, 감지기등의 취부방법을 명시하는 도면을 감리, 건축주 협의후 시공하여야 한다.
      - 매입형 조명기구, 점검구, 비상등, 감지기 및 스피커등은 별도의 명기가 없으면 반드시 천장면과 동일하게 설치한다.
      - 석고보드 및 기타 천장에는 점검구를 설치하고, 위치 및 크기는 기계, 전기설비와 협의한다.
      - 건물의 단열은 부위별로 다음 열관류율기준에 적합한 두께로 시공하거나 단열재의 등급분류에 따라 제시하는 단열재의 두께로 시공한다.
      - 플로어 드레인(FLOOR DRAIN), 트렌치, 집수정의 위치는 배관 도면을 참조한다.
      - 모든 기구, 옹벽, 기둥의 정확한 위치, 크기 및 두께는 구조도를 우선적으로 참조한다.
      - 시공자는 기계, 전기, 배관으로 인한 바닥, 보, 벽의 관통부분 및 개구부의 정확한 크기와 위치를 확인하고 조정하여야 한다.
      - 가도마감과 액세스플로어는 24kg/m²의 활하중 견디고, 어떤 지점에서도 수직 혹은 수평으로 90kg의 하중에 견뎌야 한다.
    position: left-side
    source_block: both
