  - tag: MISC-NOTES-01
    name: 기타 사항 및 일반약어 섹션
    discipline: ARCHITECTURAL
    function_category: GENERAL_NOTES
    specifications:
      labels_inside:
      - 11. 기 타
      - A. 플로어 드레인(FLOOR DRAIN), 트렌치, 집수정의 위치는 바닥 도면을 참조한다.
      - B. 모든 기구, 용품, 기계의 정확한 위치, 크기 및 두께는 구조도를 우선적으로 참조한다.
      - C. 시공자는 기계, 전기, 배관공사 이한 바닥, 벽, 벽의 고름부분 및 개구부의 정확한 치수와 위치를 확인하고 조정하여야 한다.
      - D. 기초파일과 철도재료는 24kg/m² 의 중에 대고 다니는 지점에서의 수직 혹은 수평으로 90kg의 하중에 견뎌야 한다.
