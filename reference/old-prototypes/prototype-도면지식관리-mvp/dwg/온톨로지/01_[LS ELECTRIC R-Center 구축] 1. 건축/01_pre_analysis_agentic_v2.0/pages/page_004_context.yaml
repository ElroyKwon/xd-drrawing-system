      - ■ 일반사항
      - 1. 일반사항
      - A. 본 공사에 관련된 모든 사항은 건축법 및 해당 관련 규정과 파문에, 사용되는 건설재료는 KS규격품을 원칙으로 한다.
      - B. 건축물이 이면이 사람이 공사기간 중인테리어선을 위하여 구조, HVAC, 설비 등 복잡이용설비를 관련 도면을 참조한다.
      - C. 시공자는 공사시 공사비 도중 측량을 시행하여 건축주에게 적정 대지측량도의 현황을 확인하여야 한다.
      - 2. 치 수
