line_types:
- style: dashed
  meaning: 연관된 계단실 단면 연결선
  source: '페이지 4, 우측 중단 ''단면 MARKING'' 예시 및 시각적 근거: 점선 연결'
- style: dashed_box
  meaning: 상세범위가 넓을때 사용하는 상세 MARKING
  source: '페이지 4, 우측 하단 ''상세 MARKING'' 예시; 시각적 근거: 점선 테두리 사각형'
- style: dashed_circle
  meaning: 상세범위가 좁을때 사용하는 상세 MARKING
  source: '페이지 4, 우측 하단 ''상세 MARKING'' 예시; 시각적 근거: 점선 원형'
notes:
- 페이지 4는 '건축 일반 사항'이며, 우측에 '도면 표기 부호'와 '일반약어' 표가 함께 있음.
- 약어 표는 이미지에 보이는 항목만 추출했으며, 의미가 두 칸 이상으로 분리된 항목은 보이는 텍스트 그대로 기록함.
- 일부 항목은 표기 자체가 기호/약어인지 문맥상 혼재되어 있어, 보이는 텍스트 기준으로만 구조화함.
- 출처 표기는 페이지 4의 우측 상단/중단/하단 범례 영역을 기준으로 함.
