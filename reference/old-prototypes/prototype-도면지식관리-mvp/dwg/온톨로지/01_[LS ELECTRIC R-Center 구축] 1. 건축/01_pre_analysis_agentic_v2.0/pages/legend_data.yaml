confirmed_legend_pages:
- 4
symbols:
- symbol_id: SYM-001
  name: 축열 BUBBLE
  abbreviation: null
  discipline: ARCHITECTURAL
  function_category: REFERENCE
  visual_description: '원형 버블 안에 숫자/문자(예: 1, 2, A, B)가 들어가는 표기. 우측 ''도면 표기 부호'' 영역의
    ''축열 BUBBLE'' 예시와 좌측 상단의 원형 표기 예시가 보임.'
  source: '페이지 4, 우측 상단 ''도면 표기 부호'' 표 및 예시 영역; 시각적 근거: 원형 버블(1, 2, A, B)'
- symbol_id: SYM-002
  name: 실명 BOX
  abbreviation: null
  discipline: ARCHITECTURAL
  function_category: IDENTIFY
  visual_description: '직사각형 박스 안에 실명 표기(예: B101 5000)가 들어가는 표기. 우측 중단 ''실명 BOX'' 예시로
    보임.'
  source: '페이지 4, 우측 중단 ''실명 BOX'' 영역; 시각적 근거: 직사각형 박스와 ''B101 5000'' 텍스트'
- symbol_id: SYM-003
  name: 전개도
  abbreviation: null
  discipline: ARCHITECTURAL
  function_category: REFERENCE
  visual_description: 도면 표기 부호 영역의 하단 예시 중 하나로, 원형/마커 형태의 참조 표기가 보임.
  source: '페이지 4, 우측 중단 ''전개도'' 예시 영역; 시각적 근거: ''전개도'' 라벨 아래 원형 참조 표기'
- symbol_id: SYM-004
  name: 입면도
  abbreviation: null
  discipline: ARCHITECTURAL
  function_category: REFERENCE
  visual_description: 도면 표기 부호 영역의 하단 예시 중 하나로, 원형/마커 형태의 참조 표기가 보임.
  source: '페이지 4, 우측 중단 ''입면도'' 예시 영역; 시각적 근거: ''입면도'' 라벨 아래 원형 참조 표기'
- symbol_id: SYM-005
  name: 상세 MARKING
  abbreviation: null
  discipline: ARCHITECTURAL
  function_category: BOUNDARY
  visual_description: 점선 테두리의 사각형 또는 원형으로 상세 범위를 표시하는 표기. 하단 '상세범위가 넓을때'와 '상세범위가 좁을때'
    예시가 보임.
  source: '페이지 4, 우측 하단 ''상세 MARKING'' 영역; 시각적 근거: 점선 사각형/점선 원'
- symbol_id: SYM-006
  name: 단면 MARKING
  abbreviation: null
  discipline: ARCHITECTURAL
  function_category: REFERENCE
  visual_description: 삼각형/화살표 형태의 단면 참조 표기. 우측 중단 '단면 MARKING' 영역에 예시가 보임.
  source: '페이지 4, 우측 중단 ''단면 MARKING'' 영역; 시각적 근거: 삼각형/화살표형 마커'
