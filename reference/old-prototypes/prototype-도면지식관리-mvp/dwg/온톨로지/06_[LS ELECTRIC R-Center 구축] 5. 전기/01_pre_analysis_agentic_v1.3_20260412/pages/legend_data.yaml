line_types:
- style: 실선
  meaning: 전선/배선 또는 일반 연결선
- style: 점선
  meaning: 매립 또는 은폐 배선
- style: 긴 대시선
  meaning: 노출 배선
- style: 점-선 혼합
  meaning: 바닥 매립 또는 지중 배선
- style: 짧은 반복선
  meaning: 덕트/트레이 배선
- style: C 형태 선
  meaning: 공배관 표시
- style: 화살표 선
  meaning: 패널보드로의 홈런
notes:
- 페이지 하단 제목은 '전력용 범례 및 주기사항'으로 보임.
- 우측 주기사항에는 'KS' 또는 동등 이상의 제품 사용, 전선관/배선 방식, 케이블 규격 관련 문구가 보이나 일부 판독 불명확함.
- 일부 심볼은 표기와 도형이 함께 제시되며, 시각적 형태는 범례의 작은 아이콘을 기준으로 요약함.
