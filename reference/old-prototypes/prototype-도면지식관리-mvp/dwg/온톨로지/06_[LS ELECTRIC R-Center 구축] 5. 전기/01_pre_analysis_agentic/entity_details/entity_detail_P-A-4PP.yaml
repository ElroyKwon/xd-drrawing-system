  - source: page_021_context.yaml
    page_number: 21
    text: '3Ø 440V 전원을 전기실에서 받아 1층 Drive 시험실의 6개 분전반(P-A-4PP-1~6)으로 분기하는 단선 결선도이다.


      각 분전반에는 MCCB, SPD, 접지(E3) 표기가 반복되며, 본문에서 6개 반복 구성이 확인된다.


      도면은 생산동력 분전반 계통이며, 표제란 기준 도면번호는 EE-01-017, 제목은 생산동력(3Ø 440V) 분전반 결선도-1이다.'
