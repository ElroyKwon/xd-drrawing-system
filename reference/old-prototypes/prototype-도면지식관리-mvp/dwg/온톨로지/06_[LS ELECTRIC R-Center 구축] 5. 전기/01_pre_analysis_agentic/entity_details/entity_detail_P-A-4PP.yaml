    text: '3Ø 440V 생산동력 분전반 6개(P-A-4PP-7, P-AC-4PP-1, P-C-4PP, P-E-4PP, P-F-4PP, P-P-4PP)가
      한 페이지에 배치된 단선결선도이다.


      각 분전반에는 R/S/T 전원 유입, MCCB, SPD, 접지(E3) 표기가 반복되며, 우측 표제란에 LS Electric, R-Center
      구축, 프로젝트 번호 624001이 보인다.


      도면 제목과 도면 번호는 하단 중앙 및 우측 표제란에 확인되며, 리비전은 페이지 내에서 판독되지 않아 UNKNOWN이다.'
