reason: 이전 평가를 유지한다. BLDG-001은 태그 형식상 엔티티처럼 보이지만, 근거 데이터는 일관된 단일 설비의 고유 사양이 아니라 도면별
  건물명/공간명/층 표기를 혼합해 수집한 수준이다. page 4의 R-Center, page 19의 가운건축, page 22의 생산동, page
  38의 옥탑지붕층은 동일 실체의 확정적 별칭이라 보기 어렵고, page 37의 피뢰·접지 요구사항 역시 건물 또는 층/영역에 적용되는 설계 조건이지
  BLDG-001 자체의 독립 설비 스펙으로 보기 어렵다. 또한 observed_relations에서 다수 설비와 zone을 contains/located_in
  관계로 묶고 있어, 이는 개별 장비라기보다 건물/공간 컨테이너 역할에 가깝다. 따라서 "고유 tag + 자체 spec + 독립 물리 설비" 기준을
  충족하지 못하며, 온톨로지 진입 시 독립 equipment보다는 Building/Zone 계열의 비설비성 엔티티로 강등하는 판단이 타당하다.
