  전환 가능하며, 도면번호/프로젝트명은 메타데이터로 보이지만 본 엔티티의 핵심 사양은 유지된다. 중복 후보는 read_entity_list/read_page_context에서
  동일 물리 설비를 가리킨다는 명확한 증거가 없어 확인되지 않았다.'
