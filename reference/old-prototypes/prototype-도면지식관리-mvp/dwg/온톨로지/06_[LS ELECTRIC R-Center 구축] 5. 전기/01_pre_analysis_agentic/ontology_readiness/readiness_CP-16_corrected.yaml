reason: 이전 평가를 유지한다. CP-16의 명시 type이 Circuit이고, drawing_texts에서도 "Incoming power panel
  or circuit", function_category "회로"로 식별되어 독립 설비보다는 회로/패널 계통 표기 성격이 강하다. specs 역시
  drawing_number, title, classification, discipline 등 도면 메타정보에 한정되어 있으며, 용량·정격·모델·제조사·치수
  등 개별 설비를 식별할 수 있는 고유 사양이 없다. 관계 정보도 located_in 1건 외에 connection_specs, requirements가
  모두 비어 있어 독립 엔티티로 유지할 근거가 부족하다. 또한 유사 항목들이 동일한 Circuit 계열로 일괄 분류되어 있어 온톨로지 일관성 측면에서도
  강등이 타당하다.
