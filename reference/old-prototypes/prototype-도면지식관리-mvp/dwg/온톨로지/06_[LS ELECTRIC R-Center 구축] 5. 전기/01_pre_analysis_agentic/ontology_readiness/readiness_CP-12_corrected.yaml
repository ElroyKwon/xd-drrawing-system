reason: 이전 평가를 재검토한 결과, CP-12를 독립 온톨로지 엔티티로 유지할 근거는 여전히 부족하다. tag(CP-12)와 type(Circuit)은
  식별되지만, entity_detail의 specs가 비어 있고 requirements, connection_specs, observed_relations
  역시 모두 실질 정보가 없다. page 5 문맥에서도 CP 계열이 다수 반복 표기되는 회로군으로만 언급될 뿐, CP-12 자체의 고유 기능, 정격,
  연결 대상, 역할 차별점이 확인되지 않는다. similar_equipment에 CP-1~CP-11이 함께 제시된 점도 CP-12가 독립 설비라기보다
  상위 전기계통 내 반복 분기회로/부속 회로 항목일 가능성을 강화한다. 따라서 현재 증거 수준에서는 ElectricalCircuit 계열의 독립
  개체로 승격하기보다, 상위 수전설비 또는 단선결선도 내 하위 회로 구성요소로 강등하는 판단이 타당하다.
