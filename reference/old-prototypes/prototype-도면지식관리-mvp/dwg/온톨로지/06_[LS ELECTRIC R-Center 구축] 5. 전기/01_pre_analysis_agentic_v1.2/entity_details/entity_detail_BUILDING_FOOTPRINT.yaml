    text: '지붕층 피뢰 및 접지 설비 평면도로, 피뢰침 1개소와 수평도체(STS 환봉 8㎜), 구조체 접속 12개소, 금속 사다리 접속 2개소,
      피뢰기초접지극 연결 2개소가 표시됨.


      보호등급은 IV등급, 회전구체반경은 60 m로 표기되어 있으며, 주 인하도선은 기초철골, 보조 인하도선은 F-GV 50㎟(HI-PVC 28C)로
      기재됨.


      우측 상단에 피뢰설비 개요/특기사항과 범례가 있고, 표제란에는 LS Electric R-Center 구축, 가운건축, 축척 A1 1/200·A3
      1/400, 날짜 2024.04가 보임.'
