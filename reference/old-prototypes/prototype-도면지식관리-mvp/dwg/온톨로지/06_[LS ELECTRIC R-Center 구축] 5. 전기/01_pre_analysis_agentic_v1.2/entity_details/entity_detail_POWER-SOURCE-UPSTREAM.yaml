  drawing_texts:
  - source: page 21 executive_summary
    page_number: 21
    text: '생산동력(3Ø 440V) 분전반 결선도-1로, P-A-4PP-1부터 P-A-4PP-6까지 6개의 분전반이 2행×3열로 배치된 단선도이다.


      각 분전반에는 MAIN CB, MCCB, SPD 및 E3 접지 표기가 보이며, 우측 표제란에는 LS Electric R-Center 구축과
      도면번호 EE-01-017이 확인된다.


      용량/정격 관련 세부 수치는 본 입력에서 명시되지 않았고, 차단기 정격/차단용량 참고표와 일반 주기사항이 함께 존재한다.'
