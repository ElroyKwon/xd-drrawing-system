  drawing_texts:
  - source: page 19
    page_number: 19
    text: '1층 중앙실(F1-CENTRAL)에 Panel Board 4대(P-EA-2PP, P-F-2PP, P-G-2PP, P-I-2PP)가
      배치된 생산동력(3Ø 220V) 분전반 결선도이다.


      각 패널보드 상단에 MCS 2P 600V가 표시되어 있으며, 도면 중앙의 MAIN 수직 배선으로 4개 패널이 연결되는 구조가 보인다.


      패널 내부에는 M.C.C.B 및 UNIT/회로 번호/차단기 용량 표기가 있으나, 본 취합본에는 상세 회로값이 미포함되어 있다.'
  - source: page 20
    page_number: 20
    text: '생산동력(3Ø 380V) 분전반 결선도로, 페이지 내에 7개의 분전반 태그(P-A-3PP, P-AC-3PP, P-D-3PP, P-E-3PP,
      P-F-3PP, P-G-3PP, P-I-3PP)가 병렬 배치되어 있다.


      우측 표제란에는 LS Electric / R-Center 구축, 도면번호 EE-01-016이 보이며, 차단기 정격 30AF~600AF와
      차단용량 5KA 이상~50KA 이상 표기가 확인된다.


      도면은 각 분전반 내부 결선과 보호기기/접지 관련 심볼을 포함하나, 분전반 간 외부 연결이나 공간 계층 정보는 확인되지 않는다.'
  - source: page 22
    page_number: 22
    text: '3Ø 440V 생산동력 분전반 결선도이며, 한 페이지에 6개의 분전반 단선/결선도가 배치되어 있다.


      각 분전반은 MCCB, SPD, 접지(E3)와 함께 구성되며, 패널 위치는 1층 Drive 시험실, 1층 대용량 모터부하실(방음), 첨부품,
      1층 환경시험실, 1층 진동시험실, 고객접견공간으로 읽힌다.


      표제란에는 LS Electric, R-Center 구축, 프로젝트 번호 624001, 도면번호 EE-01-018이 보이며, 범례 외 신규
      심볼은 확인되지 않는다.'
  - source: page 23
    page_number: 23
    text: '상단 케이블 스케줄과 하단 단선/계통 연결도가 함께 있는 전기 도면이다.


      주요 태그로 LP-1F, IVR-2, LV-6, P-A-2PP-1, P-A-4PP-7 등 다수의 패널/설비가 확인된다.


      전압 표기는 6.6kV, 380/220V, 440V, 220V가 보이며, FROM: UT동 전기실 및 지하공동구 사용 문구가 확인된다.'
