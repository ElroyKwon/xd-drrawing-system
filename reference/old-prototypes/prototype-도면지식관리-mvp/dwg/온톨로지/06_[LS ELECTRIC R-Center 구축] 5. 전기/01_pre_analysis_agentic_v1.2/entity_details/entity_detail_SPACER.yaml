    text: '옥외 전력간선설비 인입 배치도로, R-Center 변전실에서 UT동 1층 변전실 및 공동구/덕트뱅크 경로를 따라 전력 인입이 구성되어
      있다.


      주요 설비는 전력용 맨홀 2개, PULL BOX 2개, EMPTY PIPE(ELP100), CONCRETE DUCT BANK, SPACER,
      지중선표시기이며, 6.6kV 고압 케이블 사양이 표기되어 있다.


      우측 상단에 SECTION 1, SECTION 2 단면 상세와 우측 중단의 지하공동구 현황 사진이 함께 배치되어 있다.'
