  drawing_texts:
  - source: page 39 executive_summary
    page_number: 39
    text: 'LS Electric R-Center의 피뢰접지설비(GRND-SYS-001) 상세 도면으로 보이며, STS 316 접지봉, HI-PVC
      와이어, 테스트 로드와 함께 접지 단자함/버스바/절연체/철골·철근 접속 부품이 표시되어 있다.


      텍스트 분석 기준으로 5CCT(HI-PVC 28C), 10CCT, 1CCT 표기가 확인되며, 기존 HCCT/NICCT/SCCT 명명은 실제
      회로 번호와의 대응이 불명확하다.


      용량/정격 정보로는 STS 316 Grounding Rod 500×300mm, Test Rod Ø14×1,000mm, 1-6W Wire(HI-PVC),
      5CCT(HI-PVC 28C) 등이 확인되며, 일부 설비는 위치·연결관계가 미정의 상태다.'
