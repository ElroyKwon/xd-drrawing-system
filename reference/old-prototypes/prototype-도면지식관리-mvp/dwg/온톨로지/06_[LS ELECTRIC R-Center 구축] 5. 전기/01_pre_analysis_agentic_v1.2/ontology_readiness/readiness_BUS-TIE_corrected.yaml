reason: "이전 평가를 유지한다. BUS-TIE(Bus Tie Switch)는 전력 배전 계통에서 두 모선(Bus) 구간을 연결하는 실재하는\
  \ 전기 설비 유형이며, 단선결선도(SLD) 상의 표기는 실제 장비를 지시할 가능성이 있다. 그러나 재평가 후에도 독립 엔티티로 승격하기에는 다음\
  \ 결함이 해소되지 않았다:\n1. [식별 미흡] 태그 직접 검색 불가, page 5 표기 단독 확인으로\n   장비 고유 식별이 불충분함.\n\
  \n2. [사양 부재] 전압 등급, 전류 정격, 차단 용량 등 설비 고유\n   전기적 사양이 전혀 확인되지 않음. spec 항목의 'BUS TIE'는\n\
  \   라벨 문자열에 불과함.\n\n3. [연결 정보 부재] Bus Tie Switch의 존재 의미는 연결하는\n   두 Bus 구간에 있으나,\
  \ connection_specs 및 observed_relations\n   모두 비어 있어 어느 Bus와 어느 Bus를 연결하는지 불명확함.\n\
  \n4. [단일 출처] 오직 page 5 단선결선도 텍스트만 근거이며,\n   장비 목록·데이터시트 등 보완 출처 없음.\n\n결론적으로, 현\
  \ 데이터 상태에서는 도면 표기(annotation) 수준의 메타 엔티티로 분류하는 것이 타당하다. 향후 연결 버스 정보 및 전기적 정격이 확인될\
  \ 경우 승격 재검토 가능."
