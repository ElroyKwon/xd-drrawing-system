reason: "재평가 결과 이전 판정을 유지한다. '2층 F.L'은 도면상 층 기준레벨(Finished Level) 표기로, IFC/BOT 계열\
  \ 온톨로지에서 IfcBuildingStorey 등 공간구조 클래스로 모델링될 수 있는 개념이나, 본 온톨로지의 진입 기준인 '독립 설비·장비\
  \ 엔티티' 요건을 충족하지 못한다. 구체적 근거는 다음과 같다: - requirements 및 connection_specs 항목이 모두 공란으로,\n\
  \  타 설비와의 기능적·물리적 연결 관계가 전혀 없다.\n- 해당 태그는 설치 높이·공간 기준을 도면 독자에게 전달하는\n  주석(annotation)으로\
  \ 사용되며, 자체 운전·유지관리 속성이 없다.\n- 1층 F.L, 지붕층 F.L 등 동류 항목 모두 동일한 이유로\n  document_metadata\
  \ 처리가 일관성 있다.\n따라서 본 태그는 document_metadata(floor_level_reference)로 강등을 최종 확정한다."
