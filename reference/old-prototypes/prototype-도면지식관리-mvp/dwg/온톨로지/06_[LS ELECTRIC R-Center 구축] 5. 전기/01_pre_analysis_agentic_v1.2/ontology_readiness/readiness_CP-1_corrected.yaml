verdict: demoted
confidence: 0.95
reason: 이전 평가와 동일한 결론을 유지한다. entity_detail 전반을 재검토한 결과, CP-1에 대한 독립 사양(전압등급, 용량, 제조사,
  회로 구성 등)이 전혀 확인되지 않으며, specs는 도면번호(EE-01-001)와 도면 제목만 존재한다. 도면 본문 내 위치도 '기타 표기'
  항목으로, BUS TIE·JUNCTION BOX·NVR·DC LIGHTING 등 설비 외 부기(annotation) 성격의 항목들과 동일 그룹에
  나열되어 있어, 독립 설비 태그로 보기 어렵다. connection_specs와 requirements가 모두 비어 있고, observed_relations에서도
  appears_in_text 단일 관계만 확인되어 계통 내 연결 구조가 전혀 파악되지 않는다. suggested_parent_class가 ElectricalPanel로
  제안되어 있으나, 이는 추정일 뿐 도면 상 근거 텍스트가 없다. 따라서 CP-1은 단선결선도 내 패널/제어반 표기 수준의 항목으로, 독립 엔티티로
  승격할 충분한 증거가 부재하여 강등(demoted) 판정을 유지한다.
tag: CP-1
