reason: "재평가 결과 이전 판정을 유지하며 신뢰도를 소폭 상향한다.\n근거는 다음과 같다.\n1. **명칭 구조**: \"A동 지상1층 인버터\
  \ 시험센타\"는 건물(A동) + 층(지상1층) +\n   공간 용도(인버터 시험센타)의 전형적인 named space 명명 패턴이다.\n  \
  \ 설비 태그 체계(예: 장비번호, 계통코드)가 포함되어 있지 않다.\n\n2. **사양 부재**: specs가 완전히 비어 있으며({}), 용량·전압·전류·\n\
  \   모델 등 설비 고유 속성이 전혀 확인되지 않는다. 독립 온톨로지\n   엔티티로 등록할 최소 요건을 충족하지 못한다.\n\n3. **연결\
  \ 관계의 성격**: R-Center 변전실과의 연결 표기는 해당\n   공간에 대한 전력 공급 경로를 나타내는 것으로, 설비 간\n   계통\
  \ 연결이 아닌 수전 구역(zone) 지정 표기에 해당한다.\n\n4. **온톨로지 분류 적합성**: 해당 항목은 equipment가 아닌\n\
  \   FacilitySpace 또는 Zone 클래스(room_area / functional_space)로\n   재분류하거나, 상위 건물 구조\
  \ 엔티티의 속성(hasSpace)으로\n   표현하는 것이 적합하다.\n\n5. **유사 설비 없음**: similar_equipment 목록이\
  \ 비어 있어\n   동급 설비로의 연계 근거도 없다.\n\n결론적으로 이 태그는 온톨로지 내 독립 equipment 엔티티로 등록하기에 부적합하며,\
  \ named space로의 강등(demoted)이 타당하다."
tag: A동 지상1층 인버터 시험센타
