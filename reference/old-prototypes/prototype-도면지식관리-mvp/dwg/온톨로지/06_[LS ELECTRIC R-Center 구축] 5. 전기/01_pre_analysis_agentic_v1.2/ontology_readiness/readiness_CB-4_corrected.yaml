reason: '이전 평가와 동일한 결론을 유지한다. 재검토 결과 다음 근거가 복합적으로 작용한다.

  [1] 케이블 고유 스펙 부재 power_cable 독립 엔티티로 인정되려면 최소한 도체 단면적(mm²), 절연 종류, 허용전류(ampacity),
  포설 방식 중 하나 이상이 확인되어야 한다. 그러나 entity_detail에 기록된 specs는 전압(시스템 전압), 도면 번호, 도면 제목
  등 문서·도면 메타데이터에 국한되며, notes에도 "CB-4 자체의 상세 케이블 규격은 확인되지 않음"이 명시되어 있다.

  [2] 연결 정보의 한계 P-A-4PP-4 및 그 내부 MAIN CB·SPD와의 연결이 기록되어 있으나, 이는 분전반 도면 내 표기를 반영한 것으로
  CB-4 케이블 자체의 독립적 사양을 뒷받침하기엔 불충분하다. 라우팅 노트("FROM: UT동 전기실 및 지하공동구 사용")는 일부 경로 정보를
  제공하지만 케이블 스펙을 대체하지 못한다.

  [3] 태그명 및 타입 불확실성 "CB"는 도면 관행상 Circuit Breaker로 해석될 여지가 있으며, power_cable로의 분류 자체가
  검증되지 않은 상태다. 타입 불확실성은 독립 엔티티 인정의 추가 장애 요인이다.

  [4] 업그레이드 불가 판단 복수 도면 출현(page 21, 23)과 고유 태그 존재는 긍정적 요소이나, 온톨로지상 의미 있는 노드로 기능하기
  위한 최소 기술 속성이 없어 도면 참조 레이블 수준으로 강등을 유지한다.'
