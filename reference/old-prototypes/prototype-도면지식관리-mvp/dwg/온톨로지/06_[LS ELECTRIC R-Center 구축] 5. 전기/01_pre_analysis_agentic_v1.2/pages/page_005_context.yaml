  summary: '22.9kV 수전설비 단선결선도로, GEN 1대와 TR 3대, VCB/GIPAM 계전·차단 계통이 중심인 전력 단선결선도이다.

    본문에는 22.9kV, 6.6kV, 440V 전압 레벨이 함께 보이며, MOF/DM, SA/LA/PF/PT/CT/ZCT, BUS TIE, JUNCTION
    BOX, REC/RECTIFIER/SCR, LV PNL/HV PNL, NVR, DC LIGHTING, DEMAND 관련 표기가 확인된다.

    부하/피더 명칭으로 공장B2동 동력, 사무동력, 오폐수처리장동력, UT동 부속동력, 오폐수동 비상, 사무동 비상, B동 비상, 공장 A 동,
    U/T 비상, 이오스솔라 동력이 보인다.

    '
