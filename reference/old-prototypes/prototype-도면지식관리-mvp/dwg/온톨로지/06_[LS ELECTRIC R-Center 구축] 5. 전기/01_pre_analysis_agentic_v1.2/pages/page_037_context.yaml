  summary: '지붕층 피뢰 및 접지 설비 평면도로, 피뢰침 1개소와 수평도체(STS 환봉 8㎜), 구조체 접속 12개소, 금속 사다리 접속
    2개소, 피뢰기초접지극 연결 2개소가 표시됨.

