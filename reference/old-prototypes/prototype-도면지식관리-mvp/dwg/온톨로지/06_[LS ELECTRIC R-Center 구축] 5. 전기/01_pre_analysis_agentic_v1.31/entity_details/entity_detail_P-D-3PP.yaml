    text: 생산동력(3Ø 380V) 분전반 결선도
  - source: page 20
    page_number: 20
    text: 전기실에서 7개 분전반(P-A-3PP, P-AC-3PP, P-D-3PP, P-E-3PP, P-F-3PP, P-G-3PP, P-I-3PP)으로
      독립 방사형 공급되는 단선도이다.
  - source: page 20
    page_number: 20
    text: 모든 분전반은 공통 접지점 E3에 연결되며, 각 분전반에 MCCB/CBR/SPD 및 MAIN 차단기 구성이 반복된다.
  - source: page 20
    page_number: 20
    text: 우측에는 일반사항/정격 표가 함께 배치되어 있고, 커버 타입은 노출형(STEEL)로 보인다.
