    text: '본 도면은 피뢰접지/전력접지/통신접지 및 Test 접지, 등전위 접속 상세를 한 장에 모은 전기 상세도이다.


      주요 설비는 STS 316 접지판, 토양매설 기초접지극, 접지단자함, 피뢰접지 단자함, 전력접지 단자함, 통신접지 단자함, Test Rod,
      CU-Busbar, Bakelite, F-GV Wire, HI-PVC 전선관이다.


      표제란과 본문 제목은 모두 "피뢰접지설비 상세도-1"이며, 도면번호는 EE-05-005로 확인된다.'
