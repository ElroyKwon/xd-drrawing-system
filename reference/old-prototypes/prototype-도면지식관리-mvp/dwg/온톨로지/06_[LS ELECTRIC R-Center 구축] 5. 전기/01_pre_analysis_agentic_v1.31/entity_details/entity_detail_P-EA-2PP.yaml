  drawing_texts:
  - source: page 19
    page_number: 19
    text: '전기실에서 R/S/T 3상 220V가 4개의 분전반(P-EA-2PP, P-F-2PP, P-G-2PP, P-I-2PP)으로 각각
      공급되는 단선 결선도이다.


      각 분전반은 노출형(STEEL) 외함, MAIN MCCB, 3Ø SPD, 접지 E3를 포함하며, 분기회로 수는 분전반별로 상이하다.


      도면상 주요 용량 표기는 P-EA-2PP 100AT, P-F-2PP 400AT, P-G-2PP 175AT, P-I-2PP 150AT이며,
      SPD 표기는 40KA/mode로 보인다.'
