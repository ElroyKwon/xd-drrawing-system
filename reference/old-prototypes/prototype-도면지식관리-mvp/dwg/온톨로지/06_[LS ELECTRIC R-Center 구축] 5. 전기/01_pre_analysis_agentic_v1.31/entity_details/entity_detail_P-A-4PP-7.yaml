    text: 'COVER TYPE: 노출형(STEEL); PANEL LOCATION: 1층 Drive 시험실; SOURCE VOLT: 440V;
      MAIN C.B TYPE: MCCB 3F 30/20AT; 3Ø S.P.D 40KA/mode'
  - source: page 22
    page_number: 22
    text: 3Ø 440V 전원을 전기실에서 인입해 6개 분전반(P-A-4PP-7, P-AC-4PP-1, P-C-4PP, P-E-4PP, P-F-4PP,
      P-P-4PP)으로 분기하는 분전반 결선도이다.
  - source: page 22
    page_number: 22
    text: 각 분전반은 노출형(STEEL)이며, MCCB와 SPD, E3 접지가 반복 표기된다.
  - source: page 22
    page_number: 22
    text: '도면상 주요 용량 표기는 MAIN C.B TYPE: MCCB 3F 30/20AT, 3Ø S.P.D 40KA/mode, SOURCE
      VOLT: 440V로 보인다.'
  - source: page 22
    page_number: 22
    text: 'AT: 100; AF: 250; 3상; 정격: 30/20AT'
  - source: page 22
    page_number: 22
    text: 3Ø S.P.D 40KA/mode
  - source: page 23
    page_number: 23
    text: 상단에 CABLE SCHEDULE & CONDUIT 표, 하단에 층별 라이저/계통도가 함께 보이는 전기 간선 계통도이다.
  - source: page 23
    page_number: 23
    text: S/S R-Center 수전반에서 LP-1F, LP-2F, P-C-3PP, P-OAC-1/2/3, P-F, IVR-2, LV-6
      및 다수의 2PP/3PP/4PP 패널로 연결된다.
  - source: page 23
    page_number: 23
    text: 표기 전압은 6.6kV, 380/220V, 440V, 220V가 보이며, 인입은 UT동 전기실에서 오는 것으로 표시된다.
