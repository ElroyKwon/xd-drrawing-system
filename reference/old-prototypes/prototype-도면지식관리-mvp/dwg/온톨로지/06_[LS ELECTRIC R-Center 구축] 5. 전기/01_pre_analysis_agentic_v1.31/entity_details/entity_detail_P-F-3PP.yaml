  drawing_texts:
  - source: page 20 executive_summary
    page_number: 20
    text: '3Ø 380V 생산동력 분전반 결선도로, 전기실에서 7개 분전반(P-A-3PP, P-AC-3PP, P-D-3PP, P-E-3PP,
      P-F-3PP, P-G-3PP, P-I-3PP)으로 독립 방사형 공급되는 단선도이다.


      모든 분전반은 공통 접지점 E3에 연결되며, 각 분전반에 MCCB/CBR/SPD 및 MAIN 차단기 구성이 반복된다.


      우측에는 일반사항/정격 표가 함께 배치되어 있고, 커버 타입은 노출형(STEEL)로 보인다.'
  - source: page 20 equipment
    page_number: 20
    text: 'P-F-3PP 분전반 (1층 진동시험실)

      spec: ''COVER TYPE: 노출형(STEEL), MAIN C.B: MCCB 3P 50/20AT (380V), SPD: 3Ø S.P.D
      40KA/mode, 분기: MCCB 3개, 인입: R S T N (3상 4선)'''
  - source: page 20 relationships
