reason: '이전 평가(demoted, 0.98)를 재검토한 결과, 강등 판정을 유지한다.

  [근거 1 - 태그 미확인] EQ-P40-012 태그 자체는 도면 내 직접 확인되지 않았으며, page 40의 텍스트 "콘크리트 기초(전기공사)"에서
  간접 추정된 것에 불과하다. 태그 실존 자체가 불확실한 상황에서 독립 엔티티로 인정하기 어렵다.

  [근거 2 - EQ 접두어 부적합] ''EQ''는 Equipment(설비/장비) 클래스를 의미하나, 콘크리트 기초는 STRUCTURAL_Foundation
  범주에 속하는 구조물이다. 접두어 자체가 온톨로지 분류 오류를 시사한다.

  [근거 3 - 독립 사양 부재] 치수, 강도, 용량 등 어떠한 수치 사양도 확인되지 않는다. 독립 엔티티로 기능하기 위한 최소한의 속성 정보가
  없다.

  [근거 4 - 참조 관계의 종속성] connection_specs의 관계 방향이 ''기초 → 베이스 상세도''로, 해당 항목은 상세도(detail
  drawing)에 종속된 하위 참조 항목으로 해석된다. 주체 엔티티가 아닌 구조 상세의 구성 요소에 해당한다.

  [근거 5 - 학제 간 혼용] cross_discipline: [STRUCTURAL, ELECTRICAL] 병기 자체가 전기공사를 위한 토목/구조
  지지물임을 나타내며, 전기 설비 온톨로지 내 독립 엔티티보다는 시공 지원 구조물(ancillary structure)로 분류하는 것이 적합하다.

  [재평가 결론] 이전 판정 대비 신뢰도를 0.98 → 0.96으로 소폭 조정한다. (태그 미확인으로 인한 불확실성 반영) 강등 판정은 유지하며,
  STRUCTURAL 도면 체계 내 베이스 상세도의 하위 주석 항목으로 재분류를 권고한다.'
