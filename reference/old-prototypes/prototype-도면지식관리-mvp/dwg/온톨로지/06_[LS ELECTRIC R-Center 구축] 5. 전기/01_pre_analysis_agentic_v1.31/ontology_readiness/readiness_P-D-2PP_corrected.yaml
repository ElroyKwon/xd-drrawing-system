confidence: 0.88
reason: 이전 평가와 동일하게 specs, connection_specs, observed_relations 모두 비어 있으며 소스 confidence
  값도 0.0으로 실질적인 사양 데이터가 전무하다. 다만 재평가 과정에서 명명 규칙(P-[Zone]-[Level]PP)이 명확히 식별되어, P-D-2PP는
  D구역 2층 Power Panelboard라는 위치·계층 정보를 암묵적으로 내포함이 확인된다. 유사 장비 목록(P-D-3PP 포함 30개 이상)은
  동일 시스템 내 구역·층별 패널보드가 체계적으로 설치됨을 시사하므로, 실물 독립 장비로서의 존재 가능성은 인정된다. 그러나 온톨로지 엔티티 승격
  요건인 자체 사양(정격, 차단용량, 회로 수 등), 연결 관계, 위치 정보가 단 하나도 문서화되지 않은 상태에서는 독립 엔티티로 확정할 근거가
  부족하다. 따라서 현 데이터 기준으로 상위 엔티티(Electrical Panelboard 클래스 또는 구역 배전 시스템)에 귀속되는 항목으로 판정을
  유지하되, 명명 규칙에서 도출되는 위치·계층 속성(zone=D, level=2, type=PP)을 메타데이터로 보존하여 추후 사양 보완 시 독립
  엔티티로 재승격할 수 있도록 한다. 이전 평가 대비 confidence를 0.97→0.88로 하향 조정한 이유는 명명 규칙이 실물 존재를 강하게
  암시하여 '완전한 허위 태그' 가능성이 낮기 때문이다.
