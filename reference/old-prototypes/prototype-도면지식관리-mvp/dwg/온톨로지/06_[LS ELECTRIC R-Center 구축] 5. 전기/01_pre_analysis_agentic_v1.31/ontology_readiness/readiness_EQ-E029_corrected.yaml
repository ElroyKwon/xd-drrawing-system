reason: "재평가 결과 이전 판정(demoted, 0.96)을 유지한다.\nEQ-E029는 type이 '압착 슬리브'로, 피뢰접지설비 상세도-1(page\
  \ 39) 맥락에서 도체 간 접속 수단으로 사용되는 설치 부자재에 해당한다.\n강등 근거는 다음과 같다: 1. 독립 사양 부재: specs, connection_specs,\
  \ requirements 모두 미확인.\n   독립 엔티티 성립을 위한 최소 속성이 없다.\n2. 관계 정보 부재: observed_relations,\
  \ observed_attributes, similar_equipment\n   모두 빈 값으로, 온톨로지 내 위상(position)을 정의할\
  \ 수 없다.\n3. 기능적 성격: 압착 슬리브는 도체를 기계적·전기적으로 접합하는\n   접속 부자재(accessory/hardware)이며,\
  \ 독립 설비로 분류되지 않는다.\n   피뢰접지 계통에서도 도체(접지선, 피뢰도선)의 하위 연결 수단으로만 기능한다.\n4. 상위 클래스 검토:\
  \ suggested_parent_class가 ELECTRICAL_COMPONENT이나,\n   실질적으로는 GROUNDING_SYSTEM 또는\
  \ BONDING_HARDWARE의 하위\n   부품(sub-component)으로 처리하는 것이 타당하다.\n\n신뢰도를 0.96 → 0.95로\
  \ 미세 조정한 이유: 피뢰접지설비 상세도 맥락에서 태그 부여 자체는 도면 관리 목적일 가능성이 있어 극소의 불확실성을 반영하였으나, 독립 엔티티\
  \ 격상 가능성은 매우 낮다."
