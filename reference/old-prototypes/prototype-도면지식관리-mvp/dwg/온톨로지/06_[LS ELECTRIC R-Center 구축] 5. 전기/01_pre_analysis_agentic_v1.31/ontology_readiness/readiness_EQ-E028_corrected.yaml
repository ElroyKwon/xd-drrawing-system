reason: "재평가 후에도 이전 판정을 유지한다.\n1. **부품 성격 확정**: 압착단자(Crimp Terminal)는 전선과 단자 간 물리적\
  \ 접속을 위한\n   소모성 접속 부품(consumable accessory)으로, 설비 온톨로지상 독립 Equipment Entity가\n\
  \   아닌 자재(Material) 또는 부품(Component) 범주에 해당한다.\n\n2. **도면 내 위상 미확인**: page 39 executive_summary에\
  \ 명시된 주요 설비 목록\n   (STS 316 접지판, 접지단자함, CU-Busbar, F-GV Wire 등)에 압착단자는 포함되지 않았으며,\n\
  \   EQ-E028 고유의 독립 사양(정격, 크기, 재질 등)이 어떤 소스에서도 확인되지 않는다.\n\n3. **관계 정보 부재**: connection_specs\
  \ 및 observed_relations 모두 비어 있어\n   계통 내 연결 위상을 파악할 수 없다. 독립 엔티티로서 필요한 최소 관계 구조가\
  \ 없다.\n\n4. **온톨로지 분류 부적합**: suggested_parent_class가 ELECTRICAL_COMPONENT로 제안되었으나,\n\
  \   압착단자는 Equipment가 아닌 Material/Part 계층으로 재분류되어야 하며,\n   별도 태그 부여보다 상위 접지 설비의 부속\
  \ 자재로 관리하는 것이 적합하다.\n\n5. **신규 근거 없음**: 이번 재평가에서 이전 판정을 번복할 추가 정보(독립 사양, 연결 정보,\n\
  \   도면 내 독립 도시 등)가 확인되지 않아 demoted 판정을 유지하며 신뢰도를 소폭 상향한다."
