  \ 엔티티로서 요구되는 물리적·기능적 사양(구경, 재질, 압력 등)이 전무하다.\n\n2. 관계의 수동성:\n   connection_specs에서\
  \ EQ-E017은 '등전위 접속'의 대상(target)으로만 등장하며,\n   자체적 기능 수행 관계가 없다. 즉, 다른 설비(접지설비)의 작용을\
  \ 받는\n   수동적 객체로만 도면에 표현된다.\n\n3. ontology_hints 자기 참조 오류:\n   observed_relations의\
  \ partner_tag가 EQ-E017 자신을 가리키고(direction: UNKNOWN),\n   이는 관계 데이터 품질 자체에 결함이 있음을\
  \ 시사한다.\n   독립 엔티티로 승격하기 위한 신뢰할 수 있는 관계 정보가 부족하다.\n\n4. 분류 성격:\n   suggested_parent_class가\
  \ PLUMBING_COMPONENT이며, 도면 맥락은\n   전기/접지 도면에서 '등전위 접속 대상'으로 참조된 배관 요소임을 확인해준다.\n\
  \   이는 독립 설비보다 타 설비의 접속 참조 객체(reference object)에 가깝다.\n\n5. 승격 재검토 여지 없음:\n   EQ-E017에\
  \ 고유 태그가 부여되어 있으나, 이것이 독립 온톨로지 엔티티\n   지위를 보장하지는 않는다. 태그 부여는 도면 식별 목적일 가능성이 높으며,\n\
  \   기능·사양·능동적 관계의 부재로 인해 독립 엔티티 요건을 충족하지 못한다.\n\n결론: EQ-E017은 접지설비의 등전위 접속 대상으로\
  \ 참조되는 배관 요소이며, 독립 온톨로지 엔티티가 아닌 참조 객체(reference/annotation object)로 처리함이 타당하다."
