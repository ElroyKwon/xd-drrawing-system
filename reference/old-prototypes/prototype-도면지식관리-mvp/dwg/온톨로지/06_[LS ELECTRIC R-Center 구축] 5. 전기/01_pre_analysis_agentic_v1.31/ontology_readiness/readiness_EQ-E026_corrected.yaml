reason: "재평가 결과, 이전 demoted 판정을 유지한다.\n1. **사양 부재**: specs가 완전히 비어 있으며({}) 치수·재질·규격\
  \ 등\n   독립 설비로서의 식별 기준이 전무하다.\n\n2. **도면 내 미등재**: page 39(EE-05-005) 장비 목록은 EQ-E001~EQ-E015\n\
  \   범위에서 명시되어 있으며, EQ-E026은 해당 목록에 명시적으로 등장하지\n   않는다. 태그 번호 불연속(E015 → E026)은 출처\
  \ 신뢰도를 낮춘다.\n\n3. **부속품 성격**: 철근클램프는 피뢰·접지 계통에서 나동선/F-GV Wire를\n   구조체 철근에 고정·접속하기\
  \ 위한 연결 하드웨어(접속 부자재)이다.\n   EQ-E003(접지단자함), EQ-E005(피뢰접지 단자함)와 connected_to 관계가\n\
  \   존재하나, 이는 클램프가 해당 설비의 배선 경로 상에 있는 부속 역할임을\n   뒷받침할 뿐 독립 설비 지위를 입증하지 않는다.\n\n\
  4. **온톨로지 진입 기준 미달**: 독립 기능(FUNCTION_CATEGORY),\n   위치(LOCATION), 규격이 모두 확정되지 않아\
  \ 온톨로지 노드로서\n   재현 가능한 동일성(identity)을 보장할 수 없다.\n\n결론: EQ-E026 철근클램프는 접지 배선 계통의\
  \ 연결 부자재로 분류되며, 상위 설비(접지단자함 등)의 부속 속성(attribute) 또는 관계 메타데이터로 처리함이 적절하다. 독립 엔티티\
  \ 진입 불가."
tag: EQ-E026
