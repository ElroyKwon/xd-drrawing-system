reason: '이전 평가와 동일한 결론을 유지하며, 근거를 보완한다.

  [1] 태그 성격 분석] EQ-E019의 type이 ''기계관''으로, page 39 도면(피뢰접지설비 상세도-1)에서 수도관/가스관/기계관/배관류가
  나열된 ''등전위 접속 대상 목록'' 항목으로만 등장한다. 이는 독립 설비가 아닌 범주적 참조(categorical reference)에 해당한다.

  [2] 사양 부재] specs 딕셔너리가 완전히 비어 있고, 재질·구경·압력등급·설치위치 등 기계관을 독립 엔티티로 식별할 수 있는 어떠한 물리적
  속성도 확인되지 않는다.

  [3] 도면 맥락 부적합] 해당 도면의 주요 설비 목록(STS 316 접지판, 토양매설 기초접지극, 접지단자함 등)에 EQ-E019는 포함되지
  않으며, 오직 ''등전위 본딩 대상''이라는 수동적 역할로만 언급된다. 등전위 접속 대상으로 열거되는 관류는 접지 설계의 대상 객체일 뿐, 독립적
  기능·운전 특성을 가진 설비로 보기 어렵다.

  [4] 관계 불완전] observed_relations의 partner_tag가 공란이며 방향도 UNKNOWN으로, 온톨로지 그래프 내 독립 노드로서의
  연결성이 사실상 없다.

  [5] 최종 판단] 독립 엔티티 승인 요건(고유 물리 사양, 도면 내 주요 설비 등재, 완전한 관계 정보) 중 어느 것도 충족하지 못하므로 ''상위
  도면의 등전위 본딩 대상 표기''로 강등을 유지한다. 이전 평가 대비 신뢰도를 0.94→0.95로 소폭 상향한다.'
