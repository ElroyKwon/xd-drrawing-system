- 상세도 제목으로 수뢰부 접속도체 상세도, 수뢰부 설치 상세도, 돌침피뢰침 상세도, 기초 상세도, 베이스 상세도, 수뢰부 설치 상세도(금속사다리
  접속)가 보임
- 범례성 번호 대응표가 포함되어 있음
- 범례에 없는 심볼은 확인되지 않음
analysis_modes:
- mode: entity_extraction
  priority: 1
  reason: 상세도 내 부재/심볼 식별이 핵심이며, 범례 대응표와 실제 배치를 대조해야 함
- mode: spatial_mapping
  priority: 2
  reason: 여러 상세 뷰의 배치와 각 뷰의 구성 요소 위치 확인이 필요함
- mode: power_flow_topology
  priority: 3
  reason: 피뢰접지설비의 접속 관계와 흐름 방향을 확인할 수 있음
