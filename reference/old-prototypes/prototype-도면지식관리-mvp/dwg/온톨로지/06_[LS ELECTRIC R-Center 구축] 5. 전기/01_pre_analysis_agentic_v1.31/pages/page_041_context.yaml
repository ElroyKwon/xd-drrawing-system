visual_semantics:
  model: claude-sonnet-4-6
  panels:
  - panel_id: PNL-001
    shape: rectangle
    labels_inside:
    - ■ 내진설계 주기사항
    - 1. 전기분야 건축 비구조요소 및 그 지지부와 연결부는 국토교통부 건축물 내진 설계기준 KDS 41 17 00의 규정에 따라 시공하여야
      한다.
    - 2. 지진 이후에도 반드시 기능이 유지되어야 하는 비구조 요소의 경우 다음의 규정을 통해 내진성능을 증명하는 공인된 업체제품을 적용하여야
      한다.
    - 1) 기능유지가 요구되는 전기 비구조요소의 구동부분 혹은 중요 부분은 설계점화 18.1.3.2의 규정에 의한 진동대 실험을 통해 해당 설계
      지진 수준도, 정상 작동함을 증명하는 공인된 업체제품을 적용하여야 한다.
    - 2) 중요도계수가 1.5인 비형물질과 관련한 비구조요소의 경우 시공자는 정밀해석과 진동대 실험등을 통해 설계 지진 시에도 비형물질이 유출되지
      않음을 증명하는 공인된 업체제품을 적용하여야 한다.
    - 3. 중요도계수(p=1.5)이상의 경우 인명안전을 위해 지진 이후에도 반드시 기능하여야 하는 비구조소에, 또한 피난경로(계단, 캐노피,
      비상구 등) 확보에 지지를 주는 비구조소에는 내진 기능이 있는 제품을 적용하여야 한다.
    labels_above: []
    labels_below: []
    equipment_symbols: []
    inferred_name: 내진설계 주기사항 텍스트 블록
    position: top-left
  - panel_id: PNL-002
    shape: rectangle
    labels_inside:
    - ■ 내진 전기 설비 설계 및 시공방법
    - 1. 각종 버팀대는 시공자 및 제작자가 설계한 구조계산서를 첨부 제출하여 시공하여야 한다.
    - 2. 전기 노출배관이나 케이블 트레이, 버스 덕트 배관은 상세도에 준하여 내진 연결체인가와 및 내진스프링행거를 설치하는 것을 기준으로 한다.
    - (발전기용 장비와 일상용 배관 및 트레이 등은 갈브레이나 앵커유카로 배관 배선 전동하여 고정한다.)
    - 3. 시공자는 추 설치 목상형 앵커의 설치위치, 개수 및 앵커의 규격은 도면에 표기된 내용을 참조하여 건축 구조기준(국토교통부고시 제2019-117호
      2019.03.14.)에 적합하게 설치하여야 한다.
