    - ■ 주 기 사 항
    - 1. 모든 자재는 "KS" 또는 동등 이상의 제품을 사용하고, 관련법규를 준수하여 시공한다.
    - 2. 모든 전선관은 경질비닐(PVC)전선관을 사용한다. 그 외 노출 동력 공사는 아연도 강제 전선관(HDG)을
    - 사용한다. (단, 28C 이하 콘크리트 매입 및 옥내 전개된 장소에는 전선관은 CD 난연관을 사용하고,
    - 그 이외의 매입되는 장소에는 불연재 전선관을 사용한다.)
    - 3. Cable Tray 내에서는 배관을 사용하지 않는다.
    - 4. 본 도면의 특기 없는 각 설비별 배관 배선은 다음과 같다.
    - ■ 조명설비 상호간 배관배선 (단선 및 연선사용)
    - HFIX 2.5mm²x 2, E-2.5mm²(16C)
    - HFIX 2.5mm²x 3, E-2.5mm²(16C)
    - HFIX 2.5mm²x 4, E-2.5mm²(22C)
    - HFIX 2.5mm²x 6, E-2.5mm²(22C)
    - ■ 전열설비 상호간 배관배선 (단선 및 연선사용)
    - HFIX 4mm²x 2, E-4mm²(22C)
    - HFIX 4mm²x 4, E-4mm²(28C)
    - 5. 스위치에는 접지선을 사용하지 않는다.
    - 6. 전선은 특기 없는 한 450/750V급 저독성 폴리올레핀 절연전선(HFIX)을 사용한다.
    - 7. 현장 여건상 또는 기타 사항으로 부득이 변경이 불가피할 경우에는 관계 법령의 테두리 내에서
    - 시행하되,감독관의 선승인을 득한후 착수하여야 한다.
    - 8. 모든상세도는 시공을 위한 예시도면이며, 특히 각종 외함상세도는 납품업체에 따라 크기가
    - 상이할 수 있으며 현장여건에 준하여 감독관과 상이후 시공할 것.
