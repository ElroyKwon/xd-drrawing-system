  general_notes:
  - note_id: NOTE-1
    text: 모든 자재는 'KS' 또는 동등 이상의 제품을 사용하고, 관련법규를 준수하여 시공한다.
  - note_id: NOTE-2
    text: 모든 전선관 경비닐(PVC)전선관을 사용한다. 그 외 노출 통과 사용시 아연도 강제 전선관(HGI)을 사용한다. (단, 2BC 이하
      콘크리트 매입 및 옥내 전기실 및 노출되는 전선관은 CD 난연관을 사용하고, 그 이외의 매입은 접속에는 생략된 전선관을 사용한다.)
  - note_id: NOTE-3
    text: Cable Tray 내에서는 배관을 삽입하지 않는다.
  - note_id: NOTE-4
