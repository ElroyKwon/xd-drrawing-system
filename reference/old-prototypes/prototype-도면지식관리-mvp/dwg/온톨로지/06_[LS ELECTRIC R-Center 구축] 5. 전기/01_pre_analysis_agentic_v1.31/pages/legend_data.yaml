line_types:
- style: 실선
  meaning: 전선관 인입, 통과, 인하
- style: 실선
  meaning: 조명설비 상호간 배관(단선 및 연선사용)
- style: 실선
  meaning: 전원설비 상호간 배관(단선 및 연선사용)
- style: 점선
  meaning: 노출배관 배선
- style: 일점쇄선
  meaning: 바닥 은폐배관, 배선 또는 지중 미설배관, 배선
- style: 실선
  meaning: Duct, Tray내 배선
- style: 실선
  meaning: Without Conduit
- style: 화살표 선
  meaning: Homerun to Panelboard
- style: C 형태 기호
  meaning: Empty Conduit
notes:
- 페이지 우측 주기사항에 Cable Tray에서는 배관을 사용하지 않는다고 기재됨.
- 페이지 우측 주기사항에 스위치에는 접지선을 사용하지 않는다고 기재됨.
- 페이지 우측 주기사항에 전선은 450/750V급 난연 PVC 절연 전선을 사용한다고 기재됨.
- 페이지 우측 주기사항에 현장 여건상 변경 시 관계 법령 범위 내에서 시공하라고 기재됨.
- 페이지 우측 주기사항에 모든 상세도는 시공을 위한 예시도면이라고 기재됨.
