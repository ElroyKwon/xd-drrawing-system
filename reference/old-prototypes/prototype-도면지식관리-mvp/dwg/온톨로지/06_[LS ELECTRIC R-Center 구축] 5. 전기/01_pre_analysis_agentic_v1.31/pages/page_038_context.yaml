    - '보조 인하도선 : F-GV 50㎟ (HI-PVC 28C)'
    - 1. KS C IEC 62305 의거 건축 구조물은 수뢰부 시스템의 자연적구성부재요건(KS C IEC 62305-3/5.2.5절)을 충족하고,
