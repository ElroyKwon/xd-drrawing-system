  discipline: ELECTRICAL
  confidence: 0.96
  summary: '22.9kV 수전설비 단선결선도로, KEPCO 인입, MOF, VCB, TR, GIPAM 보호계전기, CT/PT/SA/LA 및
    BUS TIE, GEN, LV/HV PNL 계통이 단선결선 형태로 연결되어 있다.

    도면상 22.9kV, 6.6kV, 440V 전압 표기가 보이며, TR #1~#4와 다수의 VCB/배전반 베이, 비상·동력 부하 계통이 함께
    표시된다.

    표제란에는 EE-01-001, 2024.04, LS Electric R-Center 구축, GAUN Architects & Engineers가
    보인다.

    '
