- 범례에 있는 전기 심볼 중 차단기, 퓨즈, 변압기, 접지 관련 심볼과 유사한 요소가 보이나, 이미지 해상도상 개별 심볼명은 일부만 확정 가능하다.
analysis_modes:
- mode: entity_extraction
  priority: 1
  reason: 패널 보드, 차단기, 접지, 정격 표 등 도면 내 개체 식별이 핵심이다.
- mode: power_flow_topology
  priority: 2
  reason: 상류 전원에서 각 분전반으로 내려가는 단선 흐름과 분기 관계가 명확하다.
- mode: spatial_mapping
  priority: 3
  reason: 여러 패널 블록의 좌우/상하 배치와 우측 제목란 위치를 확인할 필요가 있다.
