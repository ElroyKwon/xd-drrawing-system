      주요 사양으로 3Ф 3W 6.6kV F-CV 150㎟ -1C x6L, 전력용 맨홀 2,000 x 2,000 x 2,000mm, PULL
      BOX 400 x 400 x 300mm, ELP100 X 2가 보인다.

