ontology_readiness:
  tag: UNKNOWN-SUPPORT-FIXTURE-001
  verdict: demoted
  confidence: 0.85
  entity_qualification:
    is_independent: false
    has_unique_tag: true
    has_own_specs: true
    spec_count: 4
    reason: tag는 고유하며 specs도 존재하지만, function_category가 SUPPORT_COMPONENT이고 relations에서
      수평도체를 지지하는 부품 역할로 확인되어 독립 설비가 아니라 component로 분류됨.
  relation_completeness:
    declared_relations: 1
    discovered_relations: 1
    missing_relations: []
    completeness_rate: 1.0
  attribute_convertibility:
    total_specs: 4
    convertible: 4
    ambiguous_attributes: []
    auxiliary_attributes:
    - installation_interval
    - installation_interval_m
    - purpose
    - material
    requirement_attributes: []
    extracted_attributes: []
    provenance_attributes:
    - key: source_attribution.sonnet
      value: true
      source: sonnet
      conflict_with: null
    - key: source_attribution.gemini
      value: false
      source: gemini
      conflict_with: null
    - key: source_attribution.mini
      value: true
      source: mini
      conflict_with: null
    conflicts: []
  duplicate_candidates: []
  cross_discipline:
    links_found: []
    hints_added: []
  ontology_class_hint:
    suggested_parent_class: ElectricalSupportStructure
    alternative_parent_classes: []
  spatial_context:
    position: center-left
    source_pages:
    - 38
    room_or_zone: ''
    floor: ''
  preserved_auxiliary:
    specs_full:
      installation_interval: 1m마다 설치
      installation_interval_m: 1
      purpose: 수평도체 지지
      material: 금속
    notes: []
    drawing_texts: []
    requirements: []
    source_attribution:
      sonnet: true
      gemini: false
      mini: true
    collection_sources:
      cross_validated: true
      entity_synthesis: true
  used_fields:
  - tag
  - name
  - type
  - discipline
  - function_category
  - source_pages
  - specs
  - relations
  - collection_sources
  - position
  - confidence
  - source_attribution
  - ontology_hints.suggested_parent_class
  - ontology_hints.observed_attributes
  - ontology_hints.similar_equipment
  - ontology_hints.function_candidates
  - equipment_symbols
  skipped_fields:
  - requirements (없음)
  - drawing_texts (없음)
  - ontology_hints.observed_relations (없음)
  - ontology_hints.cross_discipline (없음)
  - notes (없음)
  demoted_to:
    role: component
    parent_tag: UNKNOWN-HORIZONTAL-CONDUCTOR-001
    relation_type: part_of
    owl_pattern: :UNKNOWN-SUPPORT-FIXTURE-001 rdf:type :Component ; :partOf :UNKNOWN-HORIZONTAL-CONDUCTOR-001
  owl_export_hints:
    create_individual: true
    individual_type: :Component
    annotations_to_emit:
    - source_attribution.sonnet=true
    - source_attribution.gemini=false
    - source_attribution.mini=true
    relations_to_emit:
    - 'part_of: UNKNOWN-HORIZONTAL-CONDUCTOR-001'
    - supported_by (from UNKNOWN-HORIZONTAL-CONDUCTOR-001 to UNKNOWN-SUPPORT-FIXTURE-001)
    needs_human_review: false
tag: UNKNOWN-SUPPORT-FIXTURE-001
discovered_relations: 1
