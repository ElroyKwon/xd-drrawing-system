ontology_readiness:
  tag: LR-1
  verdict: qualified
  confidence: 0.85
  entity_qualification:
    is_independent: true
    has_unique_tag: true
    has_own_specs: true
    spec_count: 1
    reason: 고유 tag(LR-1)가 있고, type RECTIFIER 및 function_category RECTIFIER, ontology_hints.function_candidates(AC
      to DC Conversion)로 자체 사양/기능이 확인된다. 다른 설비의 부품이라는 근거는 없다.
  relation_completeness:
    declared_relations: 0
    discovered_relations: 0
    missing_relations: []
    completeness_rate: 1.0
  attribute_convertibility:
    total_specs: 1
    convertible: 0
    ambiguous_attributes:
    - key: raw_labels
      value:
      - LR-1
      - REC
      reason: 라벨 목록은 식별/표기 정보이며 정량 사양 속성으로 직접 전환하기 어렵다.
    auxiliary_attributes:
    - raw_labels
    requirement_attributes: []
    extracted_attributes: []
    provenance_attributes: []
    conflicts: []
  duplicate_candidates: []
  cross_discipline:
    links_found: []
    hints_added: []
  ontology_class_hint:
    suggested_parent_class: Rectifier
    alternative_parent_classes: []
  spatial_context:
    position: top-left
    source_pages:
    - 5
    room_or_zone: ''
    floor: ''
  preserved_auxiliary:
    specs_full:
      raw_labels:
      - LR-1
      - REC
    notes: []
    drawing_texts: []
    requirements: []
    source_attribution:
      sonnet: false
      gemini: true
      mini: true
    collection_sources:
      cross_validated: true
  used_fields:
  - tag
  - name
  - type
  - discipline
  - function_category
  - source_pages
  - specs
  - relations
  - collection_sources
  - position
  - confidence
  - source_attribution
  - ontology_hints.suggested_parent_class
  - ontology_hints.observed_attributes
  - ontology_hints.similar_equipment
  - ontology_hints.function_candidates
  skipped_fields:
  - requirements (없음)
  - drawing_texts (없음)
  - notes (없음)
  - ontology_hints.observed_relations (없음)
  - connection_specs (없음)
  - equipment_symbols (검토했으나 정보 없음)
  demoted_to:
    role: null
    parent_tag: null
    relation_type: null
    owl_pattern: null
  owl_export_hints:
    create_individual: true
    individual_type: Rectifier
    annotations_to_emit:
    - 'raw_labels: [LR-1, REC]'
    - 'source_attribution: {sonnet: false, gemini: true, mini: true}'
    - 'collection_sources: {cross_validated: true}'
    - 'position: top-left'
    - 'source_pages: [5]'
    relations_to_emit: []
    needs_human_review: false
tag: LR-1
discovered_relations: 0
