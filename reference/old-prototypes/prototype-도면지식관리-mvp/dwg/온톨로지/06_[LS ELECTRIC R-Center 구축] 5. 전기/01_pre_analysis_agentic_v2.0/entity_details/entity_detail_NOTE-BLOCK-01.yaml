specs:
  labels_inside:
  - '주기 1: EPS와 노출형 분전반의 외함 전판은 STEEL 1.6t, 측면은 STEEL 1.6t로 제작'
  - '주기 2: EPS와 매입형 분전반의 외함 전판은 STEEL 1.0t, 측면은 STS 1.5t 또는 STEEL 1.6t로 제작'
  - '주기 3: 손잡이는 누름형(비상시 잠금 가능), 나사들은 녹이 생기지 않는 재질로 한다. 정격전압 3P 4P MCCB 600V, 2P MCCB
    250V, CBR 220V 이상 제품을 설치하여야 한다.'
  - '주기 4: 차단기 변경, 추가, 삭제 등의 현장 여건에 따른 설계 변경 시 전기/통신 설계 감리 및 소방감리 (주)정명기술단에 보고 후 사용한다.'
  - '주기 5: 차단기 기준(정격): 재래의 타사 부품 사용 가능'
  - '분기 차단기 적용 차단 용량 표:'
  - 30AF → 5KA 이상
  - 50AF → 10KA 이상
  - 100AF → 25KA 이상
  - 125AF → 25KA 이상
  - 250AF → 25KA 이상
  - 400AF → 35KA 이상
  - 600AF → 50KA 이상
  - 재래의 타사 부품 사용 가능
