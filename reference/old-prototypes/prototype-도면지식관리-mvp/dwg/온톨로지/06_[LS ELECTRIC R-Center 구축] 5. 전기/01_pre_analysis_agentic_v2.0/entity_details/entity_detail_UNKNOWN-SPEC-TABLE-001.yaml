- 38
specs:
  applicable_standards: 한국전기설비규정(KEC) 150 피뢰시스템, KS C IEC 62305
  protection_level: IV등급
  protection_method: 회전구체법
  rolling_sphere_radius: 60 m
  air_termination_system: STS 환봉8㎜ + 피뢰침
  down_conductor_main: 기초철골
  down_conductor_auxiliary: F-GV 50㎟ (HI-PVC 28C)
  special_note_1: KS C IEC 62305의 기건 구조물은 수직부 시스템의 자연적구성부재(KS C IEC 62305-3/5.2.5항)를
    충족하고, 전기저항이 0.2 Ω 이하인 경우, 수평도체를 생략할 수 있다.
  special_note_2: 피뢰인하도선 자연적 구성부재인 철골 또는 철근 등을 이용하는 경우에는 접지전극과 수집부 사이의 전기저항이 0.2 Ω
    이하로 확인되는 경우에는 접속방법을 따른다.
  special_note_3: 수뢰부를 설치하여 구조물을 보호하는 경우 피뢰침 높이는 옥상구조물 보다 최소 250 ㎜이상 높아야 한다.
  special_note_4: 옥상에 노출된 도전성 부분은 수뢰부와 접속한다.
  special_note_5: 높은 구조물의 상층부의 높이가 60 m 이상이면 구조물 높이의 최하부 20%이상 이부분에 설치된 접지된 설비를 보호할
    수 있도록 수뢰부시스템을 설치하여야 한다.
  rolling_sphere_radius_m: 60
  lightning_rod_spec: STS 환봉 8㎜ + 피뢰침
