    license_info:
    - 전력시설물공사업등록 제서울 E-1-055호
    - 엔지니어링 활동주체 제806-378호
    - 전기기술사 설계감리 및 소방설계
    notes:
    - 1. 모든 자재는 'KS' 또는 동등 이상의 제품을 사용하고, 관련법규를 준수하여 시공한다.
    - 2. 모든 전선관은 경질비닐(PVC)전선관을 사용한다. 그 외 노출 후 사용시 아연도 강제 전선관(GC)을 사용한다. (단, 28C 이하
      콘크리트 매입 및 옥내 천정부 보이지않는 전선관은 CD 난연관을 사용하고, 그 이외의 매입은 보이는 배선에 전선관 및 전선관을 사용한다.)
    - 3. Cable Tray 내에서는 배관을 사용하지 않는다.
    - 4. 본 도면의 특기 없는 각 설비별 배관 배선은 다음과 같다.
    - 5. 스위치에는 접지선을 사용하지 않는다.
    - 6. 전선은 특기 없는 한 450/750V급 저독성 폴리올레핀 절연전선(HFIX)을 사용한다.
    - 7. 현장 여건상 또는 기타 사항으로 부득이 변경이 불가피할 경우에는 관계 법령의 테두리 내에서 사용하되고, 공사의 설계인을 득한 후 착공하여야
      한다.
    - 8. 모든 상세도는 시공을 위한 예시도면이며, 특히 각종 외함상세도는 납품업체에 따라 크기가 상이할 수 있으며 현장여건에 준하여 감독관과
      상이후 시공할 것.
    wiring_specs:
      lighting:
      - HFIX 2.5mm²x 2, E-2.5mm²(16C)
      - HFIX 2.5mm²x 3, E-2.5mm²(16C)
      - HFIX 2.5mm²x 4, E-2.5mm²(22C)
      receptacle:
