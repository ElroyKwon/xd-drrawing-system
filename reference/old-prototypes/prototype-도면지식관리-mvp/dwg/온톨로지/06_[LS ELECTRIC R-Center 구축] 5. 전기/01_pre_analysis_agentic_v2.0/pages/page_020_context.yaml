visual_semantics_gemini:
  model: gemini-3.1-pro-preview
  diagram_meta:
    title: 생산동력(3Ø 380V) 분전반 결선도-1
    drawing_number: EE-01-016
    project: LS Electric R-Center 구축
    designer: 가운건축 (GAUN Architects & Engineers)
    date: '2024.04'
    flow_direction: top-to-bottom
    system_type: 분전반 단선결선도
    main_voltage_kV: 0.38
    sub_voltage: 3Ø 380V
    has_generator: false
    has_bus_tie: false
    has_load_schedule: true
    schedule_columns:
    - AT
    - AF
    - P
    - TYPE
    - 'NO'
    - CKT#
    protection_relay_models: []
    notes:
    - 1. EPS내 노출형 분전반의 외함 전면은 STEEL 1.6t, 속판은 STEEL 1.6t로 제작
    - 2. EPS외 매입형 분전반의 외함 전면은 STS 1.5t, 속판 STEEL 1.6t로 한다.
    - 3. 손잡이는 누름버튼형(자물쇠 매입형) 나사류는 녹이 생기지 않는 재질로 한다.
    - 4. 정격전압이 3P, 4P MCCB 600V, 2P MCCB 250V, CBR 220V 이상 제품 설치하도록 한다. (프레임, 트립전류
      및 차단용량은 사용전압 기준임.)
    - 5. 차단기의 변경, 추가, 삭제 등의 발생시 별도의 가공을 하지 않고 변경작업이 용이하도록 가공된 내판을 사용한다.
