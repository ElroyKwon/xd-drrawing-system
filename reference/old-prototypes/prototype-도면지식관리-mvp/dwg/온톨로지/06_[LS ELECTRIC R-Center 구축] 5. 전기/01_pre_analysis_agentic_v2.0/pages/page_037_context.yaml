    - 2. 피뢰인하도선 자연적 구성부재인 철골 또는 철근 등을 이용하는 경우에는 접지전극과 수뢰부 사이의 전기저항이 0.2 Ω 이하로 확인되어야
      하며 구조체 접속방법을 따른다.
    - 3. 수뢰부를 설치하여 구조물을 보호하는 경우 피뢰침 높이는 옥상구조물 보다 최소 250 mm이상 높아야 한다.
    - 4. 옥상에 노출된 도전성 부분은 수뢰부와 접속한다.
    - 5. 높은 구조물의 상층부의 높이가 60 m 이상이면 구조물 높이의 최상부 20%이내 부분에 설치된 설비를 보호할 수 있도록 수뢰부시스템을
      설치하여야 한다.
