    page_common_notes:
    - note_id: NOTE-1
      text: EPS내 노출형 분전반의 외함 전면은 STEEL 1.6t, 측·후면 STEEL 1.6t로 제작한다.
    - note_id: NOTE-2
      text: EPS외 매입형 분전반의 외함 전면은 STS 1.5t, 측·후면 STEEL 1.6t로 제작한다.
    - note_id: NOTE-3
      text: 손잡이는 누름형(지름이 없는 형태)이며 잠금장치가 없는 제품은 사용하지 않는다. 2P MCCB 250V, CBR 220V 이상
        제품을 설치하여 한다.
    - note_id: NOTE-4
      text: 정격전압입력 3P 4P MCCB 600V 이상 사용한다.
    - note_id: NOTE-5
      text: 차단기의 변경, 추가, 삭제 등의 발생시 설계감리 및 소방업자 별도의 가공을 하지 말고 설계감리업자에게 가공을 의뢰한다.
    - note_id: NOTE-TABLE
      text: 분기 차단기 적용 차단 용량 표
      content:
      - '30AT: 5KA 이상'
      - '50AT: 10KA 이상'
      - '75AT: 10KA 이상'
      - '100AT: 25KA 이상'
      - '125AT: 25KA 이상'
      - '225AT: 25KA 이상'
      - '400AT: 35KA 이상'
      - '600AT: 50KA 이상'
      - 재해의 다구 변경이 가능함
