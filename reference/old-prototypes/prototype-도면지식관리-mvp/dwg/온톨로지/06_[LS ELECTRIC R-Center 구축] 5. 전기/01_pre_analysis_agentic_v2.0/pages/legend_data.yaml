line_types:
- style: 실선
  meaning: 표 내부 구분선 및 일반 표 경계
- style: 점선
  meaning: Exposed Conduit & Wiring
- style: 일점쇄선
  meaning: Floor Embed Conduit & Wiring or Undergrounding Conduit & Wiring
- style: 짧은 대시 반복선
  meaning: Slab Embed or Ceiling Concealed Conduit & Wiring
- style: 화살표
  meaning: Homerun to Panelboard
- style: 곡선/꺾인 배선 표기
  meaning: Conduit Rise-up, Through, and Down
notes:
- 1. 모든 자재는 'KS' 또는 동등 이상의 제품을 사용하고 관련법규를 준수하여 사용한다.
- 2. 모든 전선관은 경질비닐(PVC)전선관을 사용한다. 노출 동력 공사는 아연도 강제 전선관(HDG)을 사용하며, 콘크리트 매입 및 옥내 전기실
  장소에는 전선관을 CD 난연전선관으로 사용한다.
- 3. Cable Tray 내에서는 배관을 사용하지 않는다.
- 4. 특기 없는 각 설비별 배관 배선은 다음과 같다.
- '5. 조명설비 상호간 배관배선: HFIX 2.5mm^2 x 2, E-2.5mm^2(16C)'
- '6. 전열설비 상호간 배관배선: HFIX 4mm^2 x 2, E-4mm^2(22C)'
- 7. 스위치에는 접지선을 사용하지 않는다.
- 8. 전선은 특기 없는 한 450/750V급 저독성 폴리올레핀 절연전선(HFIX)을 사용한다.
- 9. 현장 여건상 또는 기타 사항으로 부득이 변경이 불가피할 경우에는 관계 법령의 테두리 내에서 시행하되, 감독관의 승인을 득한 후 착수하여야
  한다.
- 10. 모든 상세도는 시공을 위한 예시도면이며, 특히 각종 외함상세도는 납품업체에 따라 크기가 상이할 수 있으며 현장여건에 준하여 감독관과 상의후
  시공할 것.
