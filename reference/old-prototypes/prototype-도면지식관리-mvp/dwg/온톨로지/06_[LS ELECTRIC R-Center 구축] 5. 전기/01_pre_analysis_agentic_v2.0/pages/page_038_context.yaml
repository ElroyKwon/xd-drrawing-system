    - '특기사항 2: 피뢰인하도선 자연적 구성부재인 철골 또는 철근 등을 이용하는 경우에는 접지전극과 수집부 사이의 전기저항이 0.2 Ω 이하로
      확인되는 경우에는 접속방법을 따른다.'
    - '특기사항 3: 수뢰부를 설치하여 구조물을 보호하는 경우 피뢰침 높이는 옥상구조물 보다 최소 250 ㎜이상 높아야 한다.'
