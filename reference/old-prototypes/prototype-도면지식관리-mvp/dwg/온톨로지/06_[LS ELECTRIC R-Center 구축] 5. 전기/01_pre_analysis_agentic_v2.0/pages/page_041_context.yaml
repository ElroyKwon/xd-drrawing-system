    shape: rectangle
    labels_inside:
    - 내진 전기 설비 설계 및 시공방법
    - 1. 각종 버팀대는 시공자 및 제작자가 설계한 구조계산서를 첨부 제출하여 시공하여야 한다.
    - 2. 전기 노출배관이나 케이블 트레이, 버스 덕트 배관은 상세도에 준하여 내진 연결체인가, 내진 충돌버퍼대 및 내진스프링행거를 설치하는
      것을 기준으로 한다.
    - (발전기용 장비와 일상용 배관 및 트레이의 동은 같은 같은트라나 캐비트라에 배관 배선 전동하여 고정한다.)
    - 3. 시공자는 추 설치 목상형 행거의 설치위치, 가스 및 경량의 규격은 도면에 표기된 내용을 참조하여 건축 구조기준(국토교통부고시 제2019-117호
      2019.03.14.)에 적합하게 설치하여야 한다.
