  model: claude-sonnet-4-6
  panels:
  - panel_id: BLK-M01
    shape: rectangle
    labels_inside:
    - 내진설계 주기사항
    - 1. 전기분야 건축 비구조요소 및 그 지지부와 연결부는 국토교통부 건축물 내진 설계기준 KDS 41 17 00의 규정에 따라 시공하여야
      한다.
    - 2. 지진 이후에도 반드시 기능이 유지되어야 하는 비구조 요소의 경우 다음의 규정을 통해 내진성능을 증명하는 공인된 업체제품을 적용하여야
      한다.
    - 1) 기능유지가 요구되는 전기 비구조요소의 구성부분 혹은 중요한 부분은 설계정하 18.1.3.2의 규정에 의한 전동대 상황을 통해 해당
      설계 지진 후에도 정상 작동함을 공인된 업체제품을 적용하여야 한다.
    - 2) 중요도계수가 1.5인 비형물질과 관련한 비구조요소의 경우 시공자는 정밀해석과 진동대 실험등을 통해 설계 지진 시에도 비형물질이 유출되지
      않음을 증명하는 공인된 업체제품을 적용하여야 한다.
    - 3. 중요도계수(p=1.5)이상의 경우 인명안전을 위해 지진 후에도 반드시 기능하여야 하는 비구조소, 또한 피난경로(계단, 캐노피, 비상도
      등) 확보에 지지를 주는 비구조소에는 내진 기능이 있는 제품을 적용하여야 한다.
    labels_above: []
    labels_below: []
