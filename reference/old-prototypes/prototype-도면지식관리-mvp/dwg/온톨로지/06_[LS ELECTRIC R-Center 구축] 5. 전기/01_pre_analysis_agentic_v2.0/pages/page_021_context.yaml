    diagram_meta:
      title: 생산동력(3Ø 440V) 분전반 결선도-1
      drawing_number: EE-01-017
      discipline: ELECTRICAL
      classification: PANEL_WIRING
      subtype: motor_feeder
      flow_direction: top-to-bottom
      main_voltage: 440V
      system_type: 분전반 결선도
      panels_count: 6
      voltage_levels:
      - 440V
      panel_types:
      - P-A-4PP
      layout: 2x3_grid
      date: '2024.04'
      company: 가우니 건축 / (주) 정명기술단
      scale: 'A1: NONE / A3: NONE'
      revision: null
    page_common_notes:
    - EPS내 노출형 분전반의 외함 전면은 STEEL 1.6t, 측·상면은 STEEL 1.6t로 제작
    - EPS외 매입형 분전반의 외함 전면은 STS 1.5t 측면 STEEL 1.6t로 제작
    - 분전반은 누름버튼(시험실의 해당 패널)나사를 돌려 녹이 생기지 않는 재질로 한다
    - 정격전압의 3P 4P MCCB 600V 2P MCCB 250V CBR 220V 이상 제품을 설치하도록 한다
    - 부재명, 트립코일 및 저단용량은 사용업기준 준수
    - 차단기의 변경, 추가, 삭제 등의 동일 설비시 별도의 도면을 작성하고 업무에 따라 가능하도록 변경한다
    - '분기 차단기 적용 차단 용량: 30AF→5KA 이상, 50AF→10KA 이상, 100AF→25KA 이상, 125AF→25KA 이상, 250AF→25KA
      이상, 400AF→35KA 이상, 600AF→50KA 이상'
    - 재해의 다수 변경이 가능함
