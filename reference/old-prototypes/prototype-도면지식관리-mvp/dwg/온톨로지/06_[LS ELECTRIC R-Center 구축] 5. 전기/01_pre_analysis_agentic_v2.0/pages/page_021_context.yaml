    page_common_notes:
    - EPS내 노출형 분전반의 외함 전면은 STEEL 1.6t, 측·상면은 STEEL 1.6t로 제작
    - EPS외 매입형 분전반의 외함 전면은 STS 1.5t 측면 STEEL 1.6t로 제작
    - 손잡이는 누름버튼형(자물쇠 매입형) 나사등은 녹이 생기지 않는 재질로 한다
    - 정격전압이 3P, 4P MCCB 600V, 2P MCCB 250V, CBR 220V 이상 제품을 설치하도록 한다
    - (프레임, 트립전류 및 차단용량은 사용전압 기준임)
    - 차단기의 변경, 추가, 삭제 등의 발생시 별도의 가공을 하지 않고 변경작업이 용이하도록 가공된 내판을 사용한다
    - '분기 차단기 적용 차단 용량: 30AF→5KA 이상, 50AF→10KA 이상, 100AF→25KA 이상, 125AF→25KA 이상, 250AF→25KA
      이상, 400AF→35KA 이상, 600AF→50KA 이상'
    - 제품에 따라 변경이 가능함
