- 화살표 선
- 상향/관통/하향 꺾임 선
additional_findings:
- 기존 텍스트 분류(GROUNDING_DETAIL_DRAWING)와 시각적으로 일치함
- 도면 제목란에 '피뢰접지설비 상세도-1'이 보임
- 범례에 있는 전기 심볼보다는 접지 상세 구성요소와 접속 상세가 주로 보임
- 범례에 없는 별도 전기 보호/제어 심볼은 이 페이지에서 뚜렷하게 확인되지 않음
analysis_modes:
- mode: entity_extraction
  priority: 1
  reason: 접지판, 접지극, 단자함, 접속부, 배관/구조체 등 실체 요소 식별이 핵심임
- mode: spatial_mapping
  priority: 2
  reason: 여러 상세 패널의 배치와 접속 위치 관계를 확인할 필요가 있음
- mode: power_flow_topology
  priority: 3
  reason: 접지/등전위 접속 경로를 상류-하류가 아닌 연결 관계로 정리할 수 있음
