    범례/개요에는 주 인하도선(기초철골), 보조 인하도선(F-GV 50㎟, HI-PVC 28C), 구조체 접속(철근 및 철골 접속)이 명시되어
    있으며, 보호등급은 IV등급이다.

    적용기준은 KEC 150 및 KS C IEC 62305이며, 수평도체는 STS 환봉 8㎜, 지지금구 1m마다 설치로 표기되어 있다.

