line_types:
- style: 실선
  meaning: Duct, Tray형 배선
- style: 긴 대시선
  meaning: Exposed Conduit & Wiring
- style: 점선/짧은 대시 혼합
  meaning: Floor Embed Conduit & Wiring or Undergrounding Conduit & Wiring
- style: 실선 + 점선 혼합
  meaning: Slab Embed or Ceiling Concealed Conduit & Wiring
- style: C 모양 개방형 선
  meaning: Empty Conduit
- style: 화살표 선
  meaning: Homerun to Panelboard
- style: 상향/관통/하향 꺾임 선
  meaning: Conduit Rise-up, Through, and Down
notes:
- 페이지 우측 주기사항에 '모든 자재는 KS 또는 동등 이상의 제품을 사용하고, 관련법규를 준수하여 시공한다.' 문구가 보임.
- 페이지 우측 주기사항에 'Cable Tray 내에서는 배관을 사용하지 않는다.' 문구가 보임.
- 페이지 우측 주기사항에 '스위치에는 접지선을 사용하지 않는다.' 문구가 보임.
- 페이지 우측 주기사항에 '전선은 특기 없는 한 450/750V급 저독성 폴리올레핀 절연전선(HFIX)을 사용한다.' 문구가 보임.
- 페이지 우측 주기사항에 '현장 여건상 변경이 불가피할 경우 관계 법령의 절차에 따라 시공한다.' 문구가 보임.
- 페이지 우측 주기사항에 '모든 상세도는 시공을 위한 예시도면이며 현장여건에 따라 크기가 상이할 수 있다.' 문구가 보임.
