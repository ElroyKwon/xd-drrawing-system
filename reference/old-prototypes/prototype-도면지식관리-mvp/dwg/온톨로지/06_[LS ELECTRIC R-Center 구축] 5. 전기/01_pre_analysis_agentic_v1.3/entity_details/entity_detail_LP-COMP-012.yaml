    text: '피뢰접지설비 상세도-2로, 수뢰부 접속도체·수뢰부 설치·돌침피뢰침·기초 앙카/기초·금속사다리 접속의 5개 상세도 블록으로 구성된다.


      주요 설비는 F-GV Wire, Tee Connector, Straight Connector, Flexible Connector, 지지금구,

      동관단자 2Hole, 피뢰침, 난간접지 클램프(STS + CU), 금속 사다리, 콘크리트 기초 등이다.


      표제란에 도면번호 EE-05-006과 제목 피뢰접지설비 상세도-2가 보이며, 별도 설비 태그는 보이지 않는다.'
