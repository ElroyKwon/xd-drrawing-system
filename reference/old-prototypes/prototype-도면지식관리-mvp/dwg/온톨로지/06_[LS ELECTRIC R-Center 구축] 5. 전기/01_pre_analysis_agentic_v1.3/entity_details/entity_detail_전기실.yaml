  drawing_texts:
  - source: page 19
    page_number: 19
    text: '생산동력(3Ø 220V) 분전반 결선도-2로, 전기실에서 4개 분전반(P-EA-2PP, P-F-2PP, P-G-2PP, P-I-2PP)으로
      전원이 공급되는 결선도이다.


      각 분전반에는 MAIN, MCCB, SPD, 접지(E3) 및 분기 회로가 반복되며, 우측 주기사항 영역에 차단기 정격(30AF~600AF)과
      차단용량(5KA 이상~50KA 이상) 표가 보인다.


      도면은 2x2 패널 배치의 전기 계통이며, 노출형(STEEL) 커버 타입과 FROM: 전기실 표기가 확인된다.'
  - source: page 20
    page_number: 20
    text: '생산동력(3Ø 380V) 분전반 결선도로, P-A-3PP, P-AC-3PP, P-D-3PP, P-E-3PP, P-F-3PP, P-G-3PP,
      P-I-3PP의 7개 분전반이 병렬 배치되어 있다.


      각 분전반에는 MAIN, MCCB, CBR, E3 접지 및 일부 SPD가 표시되며, 분기 회로가 다수 포함된 패널이 보인다.


      우측 표제란과 주기사항에 차단기 정격, 외함 재질/두께, 설치 조건, 주의사항이 함께 표기되어 있다.'
  - source: page 21
    page_number: 21
    text: '생산동력(3Ø 440V) 분전반 결선도-1로, 전기실에서 공급되는 3상 440V 전원이 6개의 분전반(P-A-4PP-1~P-A-4PP-6)으로
      분기되는 단선/결선 계통이다.


      각 분전반에는 MCCB, SPD, E3 접지 표기가 확인되며, 설치 위치는 1층 Drive 시험실로 보인다.


      우측 표제란에는 LS Electric R-Center 구축, 도면번호 EE-01-017, 프로젝트번호 624001, 일자 2024.04가
      보인다.'
  - source: page 22
    page_number: 22
    text: '생산동력(3Ø 440V) 분전반 결선도-2로, 한 페이지에 6개의 분전반 결선도가 2행×3열로 배치되어 있다.


      각 분전반은 FROM: 전기실, R/S/T 3상 전원 라인, MCCB, SPD, 접지(E3) 표기가 반복되며, 우측에는 주기사항과 차단용량
      표가 있다.


      차단용량 표에는 30AF 5KA 이상, 50AF 10KA 이상, 100AF 25KA 이상, 125AF 25KA 이상, 250AF 25KA
      이상, 400AF 35KA 이상, 600AF 50KA 이상이 보인다.'
  - source: page 23
    page_number: 23
    text: 'LS Electric R-Center 구축의 전력간선설비 계통도이며, 상단에는 케이블 스케줄 표, 하단에는 층별 라이저/간선 계통이
      함께 표현되어 있다.


      전원은 S/S R-Center에서 시작하며 6.6kV, 380/220V, 440V, 220V 표기가 혼재하고, LP-1F/LP-2F 및
      다수의 P-* 분기반이 연결된다.


      도면 제목란에는 "R-Center 전력간선설비 계통도"가 보이고, 우측 제목란에는 "R-Center 지상1층 전기실 확대평면도" 문구도
      함께 보여 동일 시트 내 상세 표현이 포함된 것으로 보인다.'
  - source: page 4
    page_number: 4
    text: '옥외 전력간선설비 인입 배치도로, UT동 1층 변전실에서 R-Center 변전실로 6.6kV 전력케이블이 연결되는 부지 배치와
      지중 인입 경로를 보여준다.


      공동구 내 기존 TRAY 구간과 DUCT BANK/ELP100 구간이 함께 표시되며, 전력용 맨홀 2개와 PULL BOX 2개, 지중선표시기,
      SECTION 1·2 단면 상세가 포함된다.


      우측에는 지하공동구 현황도 사진 1장이 있으며, A동 지상1층 인버터 시험센타와 A동 지하1층 전기실 방향의 연결도 함께 보인다.'
