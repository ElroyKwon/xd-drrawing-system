  drawing_texts:
  - source: page 20
    page_number: 20
    text: 'P-A-3PP

      분전반 P-A-3PP

      노출형(STEEL), 3상 380V, 위치: 1층 Drive 시험실

      생산동력(3Ø 380V) 분전반 결선도

      P-A-3PP, P-AC-3PP, P-D-3PP, P-E-3PP, P-F-3PP, P-G-3PP, P-I-3PP의 7개 분전반이 병렬 배치되어
      있다.

      각 분전반에는 MAIN, MCCB, CBR, E3 접지 및 일부 SPD가 표시되며, 분기 회로가 다수 포함된 패널이 보인다.

      우측 표제란과 주기사항에 차단기 정격, 외함 재질/두께, 설치 조건, 주의사항이 함께 표기되어 있다.'
  - source: page 23
    page_number: 23
    text: 'P-A-3PP-1

      P-A-3PP-2

      R-Center 전력간선설비 계통도

      LS Electric R-Center 구축의 전력간선설비 계통도이며, 상단에는 케이블 스케줄 표, 하단에는 층별 라이저/간선 계통이 함께
      표현되어 있다.

      전원은 S/S R-Center에서 시작하며 6.6kV, 380/220V, 440V, 220V 표기가 혼재하고, LP-1F/LP-2F 및
      다수의 P-* 분기반이 연결된다.

      도면 제목란에는 "R-Center 전력간선설비 계통도"가 보이고, 우측 제목란에는 "R-Center 지상1층 전기실 확대평면도" 문구도
      함께 보여 동일 시트 내 상세 표현이 포함된 것으로 보인다.'
