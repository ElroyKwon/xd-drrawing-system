  drawing_texts:
  - source: page 39 executive_summary
    page_number: 39
    text: '피뢰접지설비 상세도-1로, STS 316 접지판, 토양매설 기초접지극, 접지단자함 및 주접지/전력접지/통신접지/피뢰접지 단자함의
      상세 구성이 한 페이지에 정리되어 있다.


      F-GV Wire, HI PVC 전선관, CU-Busbar, Bakelite를 포함한 접속 상세와 Test 접지(E극/P극/C극, Test
      Rod) 및 등전위 접속(수도관/가스관/기계관)이 함께 보인다.


      표제란에는 도면번호 EE-05-005, 프로젝트명 LS Electric R-Center 구축, 건물명 가운건축, 날짜 2024.04가 확인되며,
      일부 단자함 상세는 예시로 표기되어 있다.'
