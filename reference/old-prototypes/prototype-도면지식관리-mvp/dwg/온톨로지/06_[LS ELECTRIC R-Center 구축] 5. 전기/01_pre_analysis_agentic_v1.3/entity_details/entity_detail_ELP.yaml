  drawing_texts:
  - source: page 4
    page_number: 4
    text: 옥외 전력간선설비 인입 배치도
  - source: page 4
    page_number: 4
    text: '옥외 전력간선설비 인입 배치도로, UT동 1층 변전실에서 R-Center 변전실로 6.6kV 전력케이블이 연결되는 부지 배치와
      지중 인입 경로를 보여준다.


      공동구 내 기존 TRAY 구간과 DUCT BANK/ELP100 구간이 함께 표시되며, 전력용 맨홀 2개와 PULL BOX 2개, 지중선표시기,
      SECTION 1·2 단면 상세가 포함된다.


      우측에는 지하공동구 현황도 사진 1장이 있으며, A동 지상1층 인버터 시험센타와 A동 지하1층 전기실 방향의 연결도 함께 보인다.'
  - source: page 4
    page_number: 4
    text: ELP100
  - source: page 4
    page_number: 4
    text: 철거후 R-Center로 이설
  - source: page 5
    page_number: 5
    text: 22.9kV 수전설비 단선결선도-U/T 동 주변전실-1(기존)
  - source: page 5
    page_number: 5
    text: '22.9kV 수전설비 단선결선도로, 상단 수전/발전기 계통에서 중간 변압기(TR), 보호계전(GIPAM/GIPAM-2000FI),
      계량(MOF) 및 개폐기(VCB, G/S)를 거쳐 하단 다수 피더로 분기되는 구조가 보인다.


      주요 설비로 TR #1, TR #2, GENERATOR, G/S, MOF, PT, CT, LA, SA, BUS TIE, JUNCTION
      BOX, REC, SCR, LV PNL, HV PNL, DC LIGHTING, NVR, MG가 관찰된다.


      도면 내 전압 표기는 22.9kV, 6.6kV, 440V가 보이며, 발전기 용량은 비상출력 1,250kVA / 1,000KW, 연속출력
      1,125kVA / 900KW로 표기되어 있다.'
  - source: page 5
    page_number: 5
    text: 'CP-1

      수전점 (Power Receiving Point)

      3Ø 4W 22.9kV-Y 60Hz, 22.9kV-Y ACSR-OC 160sqx3/ACSR 95sq(N)*20m, 22.9kV-Y CNCV-W
      200sq/1Cx3x2Line(1LINE:SPARE) (공동구:CABLE TRAY&ELP)*250m-MH없음'
  - source: page 23
    page_number: 23
    text: R-Center 전력간선설비 계통도
  - source: page 23
    page_number: 23
    text: 'LS Electric R-Center 구축의 전력간선설비 계통도이며, 상단에는 케이블 스케줄 표, 하단에는 층별 라이저/간선 계통이
      함께 표현되어 있다.


      전원은 S/S R-Center에서 시작하며 6.6kV, 380/220V, 440V, 220V 표기가 혼재하고, LP-1F/LP-2F 및
      다수의 P-* 분기반이 연결된다.


      도면 제목란에는 "R-Center 전력간선설비 계통도"가 보이고, 우측 제목란에는 "R-Center 지상1층 전기실 확대평면도" 문구도
      함께 보여 동일 시트 내 상세 표현이 포함된 것으로 보인다.'
