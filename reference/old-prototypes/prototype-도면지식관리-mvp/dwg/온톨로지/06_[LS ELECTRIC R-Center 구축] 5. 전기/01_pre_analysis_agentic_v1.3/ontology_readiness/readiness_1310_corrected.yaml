reason: "재평가 결과, 이전 판정(demoted)을 유지한다.\n핵심 근거: 1. [식별자 성격] tag 1310은 '피더 ID'로 명시되어\
  \ 있으며, 이는 장비 엔티티가 아닌\n   식별 레이블(identifier label)로 해석된다. 실제 장비라면 '피더 장치' 또는\n  \
  \ '피더 패널'로 표기되는 것이 일반적이다.\n\n2. [중복 가능성] similar_equipment 목록에 'SHV 1310'이 존재한다.\
  \ 1310은\n   SHV 1310의 피더 번호(feeder number) 속성에 해당할 가능성이 높으며,\n   독립 엔티티가 아닌 SHV\
  \ 1310의 하위 속성으로 보는 것이 타당하다.\n\n3. [스펙 부재] function_category=FEEDER 외 전압, 전류, 용량\
  \ 등 전기 피더로서\n   필수적인 사양값이 전혀 확인되지 않는다.\n\n4. [관계 부재] observed_relations가 없어 계통도상\
  \ 다른 엔티티와의 연결 구조를\n   입증할 수 없으며, 온톨로지 내 독립 노드로 정당화하기 어렵다.\n\n5. [패턴 비교] 동일 그룹의 1301A/B,\
  \ 1302A/B 등은 페어(pair) 구조로 명확히\n   회로를 구성하는 반면, 1310은 단독 표기이며 connection_specs도 없어\n\
  \   계통 구성 요소로서의 역할이 불분명하다.\n\n처리 권고: SHV 1310 엔티티의 feeder_id 속성으로 흡수하거나, 추가 도면 확인을\
  \ 통해 독립 회로 존재 여부를 재검토할 것."
