  \n3. **재료/공법 성격**: page 40의 '콘크리트 기초 (전기공사)' 텍스트는 공사 공법 또는 재료\n   사양 기술에 해당하며, 이를\
  \ 독립 설비 엔티티로 간주할 근거가 되지 않는다. LP-COMP-018과의\n   related_to 관계도 설비 연결이 아닌 공사 범위 참조\
