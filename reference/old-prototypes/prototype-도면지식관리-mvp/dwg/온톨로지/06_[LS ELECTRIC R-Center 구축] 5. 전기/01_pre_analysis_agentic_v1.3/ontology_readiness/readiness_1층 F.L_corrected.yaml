reason: "재평가 결과 이전 판정을 유지한다. '1층 F.L'은 건축·전기 도면에서 통용되는 기준 바닥 레벨(Finished Level) 표기로,\
  \ 독립 물리 설비가 아닌 공간 위치 참조 메타데이터다. 근거는 다음과 같다.\n1. [타입 성격] type이 named_level이며, 자체\
  \ 전기·기계 사양\n   (정격, 용량, 회로 정보 등)이 전혀 존재하지 않는다.\n\n2. [관계 구조] 도면 내 유일한 등장 맥락이\n \
  \  \"LP-1F location: 1층 F.L\"이며, LP-1F의 속성값으로만\n   참조될 뿐 역방향(1층 F.L이 다른 엔티티를 포함하거나\n\
  \   연결하는 관계)은 확인되지 않는다.\n\n3. [유사 패턴] '2층 F.L', '지하층 F.L' 등 동일 패턴의\n   레벨 표기가 존재하며,\
  \ 이들 모두 설비 태그가 아닌\n   층별 위치 주석으로 일관되게 사용된다.\n\n4. [처리 방향] 온톨로지 내 독립 노드로 유지하지 않고,\n\
  \   LP-1F 엔티티의 location 속성값(문자열 또는\n   별도 SpatialLevel 클래스 인스턴스)으로 편입한다.\n   SpatialLevel\
  \ 클래스를 정의한다면 floor_label: \"1층 F.L\"\n   형태로 구조화할 수 있으나, 설비 엔티티 등급은 아니다."
