reason: "재평가 결과 이전 판정(demoted)을 유지하며 신뢰도를 소폭 상향한다.\n[근거 1 - 독립 식별자 부재] 'CU-Busbar'는\
  \ 고유 인스턴스 태그(예: GRD-BUSBAR-001)가 없으며, 재질 기반 범용 명칭(CU = 구리)으로 사용되고 있어 독립 설비 엔티티의\
  \ 필수 조건인 고유 식별성을 충족하지 못한다.\n[근거 2 - BOM 구성품 명세로의 등장] page 39 도면 텍스트:\n  - \"F-GV\
  \ 50㎟ (HI-PVC 28C), 10CCT, CU-Busbar, Bakelite 포함\"\n  - \"F-GV 16㎟ (HI-PVC 16C),\
  \ 5CCT, CU-Busbar, Bakelite 포함\"\n위 표기는 단자함 내부 구성품 목록(BOM) 서술 방식으로, 독립 설비가 아닌 상위\
  \ 설비의 포함 부품으로 기술된 것이다.\n[근거 3 - included_in 관계 이중 확인] GRD-TERM-004(전력접지 단자함) 및 GRD-TERM-005(통신접지\
  \ 단자함) 양쪽에 대해 included_in 관계가 명시적으로 확인되며, 두 상위 엔티티의 hasPart 속성으로 모델링하는 것이 온톨로지 구조상\
  \ 적합하다.\n[반론 검토 - 기각] CU-Busbar가 두 단자함에 공통 등장하므로 재사용 가능한 컴포넌트 클래스 인스턴스로 볼 여지가 있으나,\
  \ 이는 독립 엔티티 승격이 아닌 Busbar 클래스 정의 수준에서 처리되어야 하며 인스턴스 독립 분리 근거로는 불충분하다.\n결론: CU-Busbar는\
  \ 상위 단자함 엔티티의 구성 속성(hasPart)으로 처리하고 독립 온톨로지 엔티티에서 제외하는 것이 타당하다."
