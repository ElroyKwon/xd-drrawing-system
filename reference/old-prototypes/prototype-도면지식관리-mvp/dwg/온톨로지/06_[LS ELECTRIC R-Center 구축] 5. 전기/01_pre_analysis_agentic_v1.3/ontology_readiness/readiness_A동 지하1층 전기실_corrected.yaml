reason: '이전 평가와 동일하게 demoted를 유지한다. type이 room_or_space이며 specs가 비어 있고, 도면 텍스트에서도
  전력 경로의 방향 참조 지점(위치 표기)으로만 등장한다. 재평가 시 connection_specs 3건(UT동 1층 변전실, R-Center 변전실,
  A동 지상1층 인버터 시험센타)과 requirements가 존재함을 확인하였으나, 이는 해당 공간을 경유하는 전력 경로의 위상(topology)
  정보이지 ''전기실'' 자체의 설비 사양이나 독립적 기능 속성이 아니다. suggested_parent_class: ElectricalRoom은
  유효한 온톨로지 클래스이나, 현재 엔티티에 귀속된 고유 속성값(정격, 용량, 계통 등)이 전무하여 독립 온톨로지 노드로 승격할 근거가 부족하다.
  다만 connection_specs와 requirements의 존재로 인해 이전 confidence(0.96)보다 낮은 0.88로 조정한다. 향후
  전기실 내 패널·변압기 등 수용 설비 정보가 확보될 경우 ElectricalRoom 클래스의 상위 공간 노드로 재승격 검토를 권장한다.'
tag: A동 지하1층 전기실
