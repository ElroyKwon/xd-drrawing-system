reason: "이전 평가와 동일한 결론을 유지한다. 'DN to : 피뢰기초접지극'은 도면상의 방향성 주석(drawing callout)으로, 'DN\
  \ to'는 'Down to'의 약어이며 인하도선이 피뢰기초접지극으로 이어짐을 나타내는 표기일 뿐 독립 설비 엔티티가 아니다.\n근거: 1. [비물리적\
  \ 속성] 자체 사양이 note_text와 connection_count(2개소)뿐이며,\n   재질·치수·모델번호 등 물리적 설비 속성이 전혀\
  \ 없다.\n2. [표기 성격] connection_specs에서 확인되듯 SC-001 → GC-001 → DC-001/002\n   경로를 가리키는\
  \ 연결 표기이며, 실체는 해당 경로의 관계(relation)다.\n3. [KEC·IEC 기준 참조] requirements에 등재된 KEC 150,\
  \ KS C IEC 62305,\n   보호등급 IV, 회전구체반경 60m는 피뢰시스템 전체 설계 기준으로,\n   이 주석 자체의 사양이 아닌\
  \ 상위 피뢰시스템 엔티티에 귀속될 정보다.\n4. [온톨로지 처리 방향] 해당 정보는 GC-001(접지 공통 노드) 또는\n   DC-001/DC-002(인하도선)의\
  \ connected_to 관계 속성으로 흡수하고,\n   connection_count(2개소)는 해당 관계의 multiplicity 속성으로\
  \ 기록하는\n   것이 적합하다.\n\n결론: 독립 엔티티로 등록하지 않고, 관련 설비 간 관계(relation) 및 주석 속성으로 강등 처리한다."
