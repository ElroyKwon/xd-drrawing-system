reason: "재평가 결과 이전 판정(demoted)을 유지한다.\n1. **태그 성격**: 'BLDG-BOUNDARY'는 명칭·도면 텍스트·요구사항\
  \ 모두에서\n   '건물 경계선' 및 '점선 표시 방식'만 서술하고 있으며,\n   이는 도면 표기 규약(drawing annotation)이지\
  \ 독립 설비(equipment)가 아니다.\n\n2. **스펙 부재**: specs에 자체 물리량·용량·재질·규격 등 설비 고유 사양이\n \
  \  전무하고, '표시형식' 하나만 존재한다.\n   이는 equipment 클래스 기준을 충족하지 못한다.\n\n3. **연결 정보 없음**:\
  \ connection_specs와 observed_relations가 모두 비어 있어\n   다른 설비와의 공학적 인터페이스가 식별되지 않는다.\n\
  \n4. **온톨로지 정합성**: suggested_parent_class=ArchitecturalBoundary,\n   cross_discipline=ARCHITECTURAL로,\
  \ 기계·전기·배관 등\n   설비 도메인이 아닌 건축 도면 요소임이 명확하다.\n\n5. **재분류 권고**: equipment → ArchitecturalAnnotation\n\
  \   또는 ArchitecturalBoundary 클래스로 이관하고,\n   설비 온톨로지 목록에서 제거하는 것이 적절하다."
