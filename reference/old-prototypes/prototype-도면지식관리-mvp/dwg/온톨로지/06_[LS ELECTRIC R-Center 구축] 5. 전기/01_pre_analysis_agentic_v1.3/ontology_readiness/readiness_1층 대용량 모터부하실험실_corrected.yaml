reason: "이전 평가와 동일한 결론을 유지한다. 본 엔티티는 type=room_name으로, 도면상 공간 식별 코드 SP-ROOM-02에 대응하는\
  \ 위치 메타데이터이며, 독립 설비가 아니다.\n재평가 근거: 1. [공간 식별자] SP-ROOM-02라는 체계적 코드가 부여되어 있고,\n \
  \  SP-ROOM-01~07 계열이 동일 패턴으로 반복됨 → 공간 분류 체계의\n   일부이지, 개별 설비 엔티티가 아님.\n\n2. [자체\
  \ 사양 부재] 공간 자체에 대한 독립 스펙(면적, 용량, 내압 등)이\n   도면에서 확인되지 않음. 기재된 '노출형(STEEL), 3상 380V'는\n\
  \   이 공간에 위치한 분전반 P-AC-3PP의 사양이며, 공간 자체의 속성이\n   아님.\n\n3. [역할 한정] 본 태그는 분전반 P-AC-3PP의\
  \ 위치(located_in) 표기를\n   위한 참조 문자열로만 기능하며, 설비 간 연결(connection_spec)의\n   주체가 되지\
  \ 않음.\n\n4. [건물 온톨로지 관점 검토] 건축 온톨로지(IFC/ifcSpace)에서는 Room을\n   독립 엔티티로 다루지만, 본 프로젝트의\
  \ 전기/기계 설비 온톨로지 범위\n   내에서는 설비 배치의 위치 컨텍스트(Room 클래스) 수준으로 처리하는\n   것이 적합하며, 독립 장비\
  \ 엔티티로 승격할 근거가 없음.\n\n처리 방향: - Room 클래스의 인스턴스로 참조 객체화 허용 - 설비 엔티티 목록에서는 제외(demoted\
  \ 유지) - 분전반 P-AC-3PP의 location 속성값으로 연결 유지"
