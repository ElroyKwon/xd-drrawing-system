reason: "재평가 결과 이전 판정을 유지한다.\n1. **엔티티 유형의 한계**: type이 room_name으로 선언되어 있으며,\n   이는\
  \ 공간 식별자(label)에 해당할 뿐 독립적인 온톨로지 노드로서의\n   클래스 인스턴스 요건을 충족하지 못한다.\n\n2. **사양 데이터\
  \ 부재**: specs에 location 외 어떠한 기술 속성도 없다.\n   ROOM 클래스 인스턴스로 진입하려면 최소한 면적(area),\
  \ 용도(function),\n   환경 조건(temperature/humidity range), 수용 장비 목록 중\n   하나 이상의 정량적\
  \ 속성이 요구되나 전혀 확인되지 않는다.\n\n3. **requirements / connection_specs 전무**: 공간 자체에 부과된\n\
  \   설계 요건이나 인터페이스 정의가 없어 다른 엔티티와의 의미적 연결\n   근거가 없다.\n\n4. **observed_relations\
  \ 비어 있음**: location_for(P-G-3PP) 관계가\n   entity_detail 내 observed_relations에 기록조차\
  \ 되지 않아,\n   공간-장비 간 관계도 현재 데이터로는 온톨로지에 표현 불가하다.\n\n5. **cross_discipline = ARCHITECTURAL\
  \ 단일**: 설비(MEP) 또는\n   공정(Process) 관점의 교차 참조가 없으므로 설비 온톨로지 범위에서\n   독립 노드로 유지할 실익이\
  \ 없다.\n\n권고 처리 방안:\n  - 해당 태그는 상위 장비(예: P-G-3PP)의 location 속성값으로\n    흡수하여 관리한다.\n\
  \  - 향후 면적·환경 사양·수용 장비 목록이 확보될 경우\n    ROOM 클래스 인스턴스로 재진입을 검토한다."
