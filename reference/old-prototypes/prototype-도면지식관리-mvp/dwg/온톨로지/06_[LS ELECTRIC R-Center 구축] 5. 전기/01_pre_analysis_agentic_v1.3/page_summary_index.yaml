  executive_summary:
    drawing_number: EE-02-001
    title: R-Center 전력간선설비 계통도
    classification: CABLE_SCHEDULE_AND_RISER_DIAGRAM
    discipline: ELECTRICAL
    confidence: 0.96
    summary: 'LS Electric R-Center 구축의 전력간선설비 계통도이며, 상단에는 케이블 스케줄 표, 하단에는 층별 라이저/간선
      계통이 함께 표현되어 있다.

      전원은 S/S R-Center에서 시작하며 6.6kV, 380/220V, 440V, 220V 표기가 혼재하고, LP-1F/LP-2F 및
      다수의 P-* 분기반이 연결된다.

      도면 제목란에는 "R-Center 전력간선설비 계통도"가 보이고, 우측 제목란에는 "R-Center 지상1층 전기실 확대평면도" 문구도
      함께 보여 동일 시트 내 상세 표현이 포함된 것으로 보인다.

      '
