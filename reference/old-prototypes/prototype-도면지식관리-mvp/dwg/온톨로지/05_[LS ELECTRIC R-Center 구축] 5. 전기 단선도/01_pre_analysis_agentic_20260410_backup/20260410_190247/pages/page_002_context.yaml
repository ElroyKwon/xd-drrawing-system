  summary: '6.6kV 변전설비 단선결선도로, R-Center 변전실 신설분과 A동 지하1층 변전실 이설분이 함께 표시되어 있다.

    주요 설비는 TR #1~#3, TR-3204, IVR 1/2, GIPAM/GIMAC, VCB/ACB/MCCB, CT/PT/ZCT/GPT, BATTERY/RECTIFIER/CAPACITOR,
    각종 HV/LV 피더 및 패널이다.

    표기된 주요 용량은 TR #1 2,000kVA, TR #2 2,000kVA, TR #3 2,000kVA, TR-3204 1,000kVA, IVR
    1 1,500kVA, IVR 2 300kVA이다.

