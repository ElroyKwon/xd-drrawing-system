    notes:
    - 1. 도면에 표기되지 않은 사항은 현장 확인 후 관계 법령의 테두리 내에서 시행하되 현장 감독관의 선승인을 득한후 시공 하도록 한다.
    - 2. 신설 공사분이며, 기존 A동 지하1층 변전실 및 지상1층 인버터 시설변전반 변전실에 표기된 부분은 이설공사분임.
    - 3. 기존 이설 배전반 일별시 측면 보호커버를 제거하여 시설하여야 하며 단설 배전반은 기존 이설배전반과 동일 색상으로 제작되어야 한다.
    - 4. "효율관리기자재 운용규정"에서 정한 고효율 변압기 사용 (표준소비효율기준을 만족하는 제품)
