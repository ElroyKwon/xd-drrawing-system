line_types:
- style: 긴 점선/파선 수평선
  meaning: 회로 구간 또는 구획 경계로 보임
- style: 실선 수평/수직 배선
  meaning: 전기 결선 또는 모선 연결로 보임
- style: 회색 물결형 강조 박스
  meaning: 도면 상 특정 구간을 강조 표시한 영역
- style: 점선 사각 경계
  meaning: 장비/구역의 범위 또는 설치 영역 경계로 보임
notes:
- '페이지 우측 상단 표 제목: ''R-Center 변전실 실별표''로 보임.'
- '좌측 하단 표 제목: ''A동 지하1층 변전실 이설분'', ''A동 인버터 시설변전 변전실 이설분''으로 보임.'
- '도면 하단 중앙 제목: ''6.6kV 변전설비 단선결선도-R-Center 변전실''로 보임.'
- 일부 약어는 이미지에서 선명하지 않아 UNKNOWN으로 유지함.
