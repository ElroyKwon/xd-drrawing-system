  summary: '6.6kV 변전설비 단선결선도이며, R-Center 변전실의 고압/저압 계통이 함께 표시되어 있다.

    주요 설비는 TR 4대, IVR 2대, 6.6kV/440V/380V/220V 계통, GIPAM 5대, GIMAC 6대, 각종 PANEL 및
    SPARE로 구성된다.

    TR-3204와 TR #1/#2/#3는 모두 6.6kV/380V, 2000kVA로 표기되어 있으며, 우측 표제란과 좌하단/상단 우측의 설비
    일람표가 함께 배치되어 있다.

    '
  title: 6.6kV 변전설비 단선결선도 - R-Center 변전실
  top_equipment:
  - TR 4대 (6.6kV / 380V, 2000kVA)
  - IVR 2대
  - GIPAM 5대
  - GIMAC 6대
  - HV 피더 7개(HV 1~5, HV 6(상), HV 7(하))
  - LV 피더 9개(LV 1~8, LV R)
  - PANEL 다수
  - LIGHTING PANEL 2개
  - RECTIFIER 1대
  - BATTERY 1식
  - CAPACITOR 1식
  - MG 1대
  - SPARE 6개
  uncertainties:
  - 범례에 없는 것으로 보이는 표기는 이미지상 확인 가능하나 판독 불명확하여 UNKNOWN으로 유지됨
  - 회색 물결형 강조 영역의 의미는 텍스트만으로 확인 불가
  - 일부 설비의 정확한 위치는 제공된 분석 결과에 명시되지 않아 null로 유지됨
  - 연결 관계는 단선결선도임에도 본문에 명시된 개별 from/to 정보가 없어 null 처리됨
