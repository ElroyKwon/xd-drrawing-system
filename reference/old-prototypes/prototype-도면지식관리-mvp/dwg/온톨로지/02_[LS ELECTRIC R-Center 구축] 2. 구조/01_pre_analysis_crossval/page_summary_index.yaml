  title: 구조일반사항-1 (철근콘크리트)
  summary: '철근콘크리트 구조 일반사항 시트로, 1. 일반사항/구조개요, 2. 철근의 최소 피복두께 및 배치 규정, 3. 철근의 정착 및
    이음길이 관련 기준과 도식이 중심이다.

    본문에는 피복두께, 철근 간격, 다발철근 간격, 표준갈고리, 정착/이음길이(3개 도식), 표준갈고리(2개 도식), 배근 점표시(4개), 단면/코너
    형상(6개), 표/그리드(10개 이상)가 보인다.

    우측 표제란에는 LS Electric / R-Center 구축 / 가온건축 표기와 도면번호 S00.11, 제목, 날짜 2024.05가 확인되며,
    설비 태그나 연결 관계는 보이지 않는다.

    '
