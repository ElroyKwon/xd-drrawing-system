    text: 'tag: SC1A, name: 기둥, spec: H-414x405x18x28'
  - source: page 31 executive_summary
    page_number: 31
    text: 'LS Electric R-Center 구축 프로젝트의 철골 주심도이며, 그리드 축선 A~D 및 1~7(2A, 5A, 5B 포함)
      상에 구조 부재 마크 SC1, SC1A, SC2, SC2A, SC2B, SC3, SC3A, SC11, SC11A, SC12, SC12A,
      SC12B, SC13, SC21, SSC1이 배치되어 있다.


      하단 MEMBER LIST에서 각 마크의 단면 규격(H-400x400x13x21 등)과 재질(SM355)이 대응되며, 표제란에는 도면번호
      S02.02, 기준일 24.05.17, 리비전 0, 설계사 GAUN이 확인된다.


      범례 전용 페이지는 아니며, 하단 표가 마크-규격 대응표 역할을 한다. 범례 데이터와의 심볼 대조는 UNKNOWN이다.'
  - source: page 35 executive_summary
    page_number: 35
    text: 'LS Electric R-Center 구축 프로젝트의 지상1층 구조평면도로, SC 계열 기둥, VBR 보, FG 기초, WC 벽체
      등 주요 구조 부재의 배치와 규격을 보여준다.


      도면 내에는 트렌치(W550XH250), Expansion Joint, THK 600mm 이중기초 표기와 관련 시공 NOTE가 포함되어
      있다.


      재료강도는 콘크리트 fck=27MPa, 철근 fy=400/500MPa, 강재 SS275/SM355이며, 기준 레벨은 1SL ±0 = GL+200
      = FH. +94.20이다.'
