  drawing_texts:
  - source: page 63
    page_number: 63
    text: '페이지 63의 철골 모멘트 접합 상세도이며, 1~8번 상세가 한 장에 배치되어 있다.


      주요 구조부재는 H-596x199x10x15(SS275)부터 H-900x300x16x28(SM355), H-200x200x8x12(SHN275,

      기둥 이음)까지 보이고, M20(F10T) 및 M22(F10T) 고장력볼트가 반복된다.


      우측 표제란에는 fck=27MPa, SD400, SD500, SS275, SM355, SHN275, 앵커볼트 Fy=660MPa 등의 재료강도

      표기가 보인다.'
  - source: page 64
    page_number: 64
    text: '철골 접합 상세도


      재료강도는 콘크리트 fck=27MPa, 철근 fy=400/500MPa, 강재 SS275/SM355/SHN275, 앵커볼트 Fy=660MPa,

      볼트 등급 F10T가 표기되어 있다.'
