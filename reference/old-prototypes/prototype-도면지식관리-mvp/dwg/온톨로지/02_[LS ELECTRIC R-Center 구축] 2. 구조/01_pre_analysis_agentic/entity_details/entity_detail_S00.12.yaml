  requirements:
  - text: 인장철근 정착 및 이음길이는 철근강도 SD500과 SD600 기준으로 구분한다.
    source: page 4
    type: design_condition
  - text: 콘크리트 압축강도 21/24/27/30/35/40 MPa 조건을 따른다.
    source: page 4
    type: design_condition
  - text: 철근 직경 D10~D29 조건을 따른다.
    source: page 4
    type: design_condition
  - text: 부재는 슬래브/기초/보/기둥/벽체 조건으로 구분한다.
    source: page 4
    type: design_condition
  - text: 피복 3cm 이상, 4cm 이상, 5cm 이상 조건이 표기되어 있다.
    source: page 4
    type: design_condition
  - text: 정착길이(ld)와 A급/B급 이음길이(1.0 x ld, 1.3 x ld) 관계가 제시된다.
    source: page 4
