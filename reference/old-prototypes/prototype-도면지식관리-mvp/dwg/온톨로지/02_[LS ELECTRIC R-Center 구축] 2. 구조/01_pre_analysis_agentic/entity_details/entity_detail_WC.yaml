  - source: page_064_context.yaml
    page_number: 64
    text: 'LS Electric R-Center 구축 공사의 철골 접합 상세도이며, WC1/WC2 RC 접합, 크레인 접합(1톤, 5톤),
      보 이음 접합, T-BAR 보강, TSG+SP1 접합 등 여러 구조 접합 상세가 한 페이지에 배치되어 있다.


      가시 태그로 WC1, WC2, CRG1, CRG2, CBR1, CBR2, BG1, BR1, BR2, 2SG2B, 2SSG2, 2SB1,
      TSG2, TSG1, SP1, ST2가 확인되며, H형강 단면, 플레이트, 볼트/앵커, 용접 기호가 함께 표기된다.


      재료강도는 콘크리트 fck=27MPa, 철근 fy=400/500MPa, 강재 SS275/SM355/SHN275, 앵커볼트 Fy=660MPa,
      볼트 등급 F10T가 표기되어 있다.'
