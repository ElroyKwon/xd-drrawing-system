    page_number: 35
    text: 'LS Electric R-Center 구축 프로젝트의 지상1층 구조평면도로, SC 계열 기둥, VBR 보, FG 기초, WC 벽체
      등 주요 구조 부재의 배치와 규격을 보여준다.


      도면 내에는 트렌치(W550XH250), Expansion Joint, THK 600mm 이중기초 표기와 관련 시공 NOTE가 포함되어
      있다.


      재료강도는 콘크리트 fck=27MPa, 철근 fy=400/500MPa, 강재 SS275/SM355이며, 기준 레벨은 1SL ±0 = GL+200
      = FH. +94.20이다.'
