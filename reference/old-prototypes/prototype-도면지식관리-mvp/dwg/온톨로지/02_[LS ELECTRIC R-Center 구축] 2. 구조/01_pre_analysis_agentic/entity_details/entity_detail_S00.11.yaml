  - source: page 3
    page_number: 3
    text: 'LS Electric R-Center 구축설계의 철근콘크리트 구조 일반사항 도면이다.


      건물개요, 사용재료(fck=27MPa, SD400/SD500), 지반/설계지하수위, 기초형식(PHC 파일, MICRO 파일)과 함께 철근
      피복두께·간격·정착·이음·표준갈고리 기준이 표와 도식으로 정리되어 있다.


      우측 표제란에 도면번호 S00.11과 제목이 확인되며, 설비 태그/공간/흐름은 보이지 않는다.'
