    - 2.2 골재의 최대크기
    - 굵은 골재의 공칭 최대 치수는 다음 값을 초과할 수 없다.
    - 1) 거푸집 양 측면 사이의 최소 거리의 1/5
    - 2) 슬래브 두께의 1/3
    - 3) 개별 철근, 다발 철근, 프리스트레스 긴장재, 또는 덕트 사이 최소 간격의 3/4
    - 4) 과다 철근 부재의 경우, 주철근의 최소 간격보다 5mm만큼 작은값과 철근의 최소 간격보다 5mm 작은 것중에 작은 값
    - 이러한 제한은 콘크리트를 공사 없이 타설할 수 없는 시공조건이나 다짐방법을 사용할 경우에는 책임기술자의 판단에 따라 적용하지 않을 수 있다.
