    shape: rectangle
    labels_inside:
    - 2.3 철근의 간격제한
    - 1) 동일평면에서 평행하는 철근사이의 수평 순간격은 철근의 공칭지름 이상, 25mm이상으로 하여야 한다.
    - 또한 굵은 골재의 공칭 최대 치수 4/3이상으로 한다.
    - 2) 상단과 하단에 2단 이상으로 배근될 때, 상하철근은 동일 연직면 내에 배근(위치)하고, 이때 상하 철근의 순간격은 25mm 이상으로
      하여야 한다.
    - 3) 나선 철근과 띠철근 기둥에서 종방향 철근사이의 순간격은 40mm 이상 철근 공칭 지름의 1.5배이상 굵은 골재 최대 치수의 4/3이상으로
      한다.
    - 4) 철근의 순간격에 대한 규정은 서로 접촉된 겹침이음 철근과 인접한 이음철근 또는 이음철근 사이의 간격에도 적용하여야 한다.
    - 5) 벽체 또는 슬래브에서 휨 주철근의 간격은 벽체나 슬래브 두께의 3배 이하 또는 최대 45cm이하로 하여야 한다.
    - (단, 콘크리트 장선구조의 경우 이 규정이 적용되지 않는다.)
    - 25mm 이상
    - 굵은 골재 치수의 4/3
    - 종 방향
    - 1.5db 이상
    - 40mm 이상
    - 굵은 골재 치수의 4/3
