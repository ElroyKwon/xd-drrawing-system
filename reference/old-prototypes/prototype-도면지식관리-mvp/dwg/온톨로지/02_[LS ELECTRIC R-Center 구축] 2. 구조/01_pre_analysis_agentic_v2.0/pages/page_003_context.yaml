    - 1) 2개 이상의 철근을 묶어서 사용하는 다발철근은 이형철근으로, 그 개수는 4개 이하이어야 하며, 보의 인장구역이나 띠철근을 둘러싸지
      않는 경우에는 2개 이하이어야 한다.
    - 2) 휨부재의 경간 내에서 끝나는 한 다발철근 내의 개별 철근은 40db 이상 서로 엇갈리게 끝내야 한다.
    - 3) 다발철근의 간격 및 피복두께를 계산할 때는 등가 원형 단면의 지름을 사용하며, 다발철근의 사용 동단면으로 환산된 철근 등가 철근으로
      보아야 한다.
    - 4) 보에서 D35를 초과하는 철근은 다발철근 형태로 사용할 수 없다.
