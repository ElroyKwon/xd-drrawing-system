      resolution_hint: '동일 출처 문구(FROM : 사무동 지상1층 방송실) 기반 중복 가능성이 높음. 페이지별 실체/표현체 구분
        필요.'
    - pattern: HUB-RACK-2 vs HUB-RACK-2F
      estimate: 2건
      resolution_hint: 둘 다 2층 허브 랙 계열이나 source_pages와 포트 수가 달라 동일/상위하위/도면별 표현인지 검토
        필요.
    - pattern: TITLE-BLOCK vs P-TITLE-BLOCK vs UNKNOWN-TITLE-001 vs UNKNOWN-PANEL-004/005
      estimate: 5~6건
      resolution_hint: 범용 표제란, 특정 페이지 표제란, 표지 요소를 문서 메타 계층으로 정리하고 물리 설비와 분리.
    - pattern: SPACE-OFFICE / SPACE-RIGHT-ZONE / SPACE-OPEN-OFFICE-EAST
      estimate: 3건
      resolution_hint: 공간 실체와 상위 구역/부분 구역 관계를 우선 판별.
    - pattern: SPACE-CONF / SPACE-CONF-ZONE-NORTH / SPACE-CONF-ZONE-SOUTH / UNKNOWN-ROOM-6/7/11
      estimate: 5~6건
      resolution_hint: 회의실 단일실 vs 다수 구역 vs 그룹 placeholder를 분리.
    - pattern: SKS-P1-10P vs SKS-P1-10P-1F
      estimate: 2건
      resolution_hint: 동일 장비명이나 스피커 수량/층 정보 차이로 실제 별도 엔티티인지 확인.
    - pattern: 2F-SPEAKER-LINE vs SPEAKER-LINE-2F-S2
      estimate: 2건
      resolution_hint: 둘 다 S2 라인 계열로 보이며 count 차이(벽부형 4 vs 2) 때문에 병합 전 보수적 검토 필요.
  ambiguity_risk_areas:
  - tag_pattern: UNKNOWN-*
    reason: placeholder, synthesized group, legend-derived type, OCR 기반 추정이 혼재함.
    recommended_handling: 실체 개체/타입 심볼/문서 요소/그룹 placeholder를 먼저 분리한 뒤 병합 판단.
  - tag_pattern: SPACE-* with equipment_symbols count=null
    reason: 공간은 명확하지만 단말 수량이 미확정(null)인 경우가 많음.
    recommended_handling: 공간 자체는 NamedIndividual로 유지하고 수량은 미기재 상태로 보존, 추정 금지.
  - tag_pattern: equipment/space 또는 communication_distribution_frame / rack 같은 복합
      type
    reason: 한 엔티티가 공간성과 장비성을 동시에 띠거나 type 문자열이 복합적임.
    recommended_handling: 주 클래스 1개 + annotation 보존 또는 다중분류 후보로 남기기.
  - tag_pattern: 본 공사 제외 / 기존 예정 자재 / 기존 / 신설
    reason: 상태 정보가 클래스인지 속성인지 혼동될 수 있음.
    recommended_handling: 우선 status 데이터 속성 또는 상태 개체 연결로 처리하고 클래스 승격은 보류.
  - tag_pattern: BOM/FACE/DETAIL vs 실제 장비 본체
    reason: 동일 명칭 장비의 상세도/자재표가 별도 엔티티로 존재.
    recommended_handling: 문서 엔티티로 분리하고 hasBOM/hasFaceDetail 관계를 우선 검토.
  - tag_pattern: EXT-* / FROM / TO / MDF 연결점
    reason: 외부 실체, 연결점, 주석성 문구가 혼재.
    recommended_handling: 외부 연결점 개체와 외부 원천 실체를 구분하고 annotation 원문을 보존.
  - tag_pattern: HUB-RACK-2 계열
    reason: page 5와 page 8/11/18에서 포트 수와 설명이 달라 동일성 불명확.
    recommended_handling: 동일 태그라도 페이지별 관찰 프로파일 비교 후 하나의 개체인지 도면별 표현인지 판단.
  - tag_pattern: speaker/self-loop relations
    reason: SKS-P1-10P -> SKS-P1-10P 같은 self-loop가 실제 내부 분기 표현일 수 있음.
    recommended_handling: 직접 object property로 단정하지 말고 내부분기 annotation 또는 hasInternalDistribution로
      별도 처리 검토.
  - tag_pattern: 문서 메타 엔티티와 실제 설비 혼재
    reason: TITLE-BLOCK, SEC-*, TOC, NOTE, PHOTO가 동일 목록에 포함됨.
    recommended_handling: 물리 설비 온톨로지와 문서 온톨로지 층위를 분리.
  - tag_pattern: OCR correction_note / hallucination note
    reason: 실제 도면에 없는 named_area 환각 제거 메모가 포함됨.
    recommended_handling: 품질관리 annotation으로 유지하고 사실 엔티티 생성 근거로 사용하지 않기.
  guidance_for_next_steps:
    for_0_9b_placement:
      focus:
      - 문서 엔티티와 물리 엔티티를 먼저 분리
      - SPACE/ROOM/GRP/OUTLET_GROUP/AP_GROUP 같은 그룹성 엔티티의 역할 판별
      - EXT-*, MANHOLE, TRAY, TUNNEL 계열을 연결점/경로/인프라로 배치
      - FACE/BOM/DETAIL을 실제 장비 본체와 연결
      - 범례 기반 타입 엔티티(AP, AMP, LAN OUTLET 등)와 실제 설치 개체를 구분
      expected_owl_role_distribution:
        NamedIndividual: 145
        PartOf: 18
        ObjectPropertyAssertion: 95
        DataPropertyValue: 420
        AnnotationOnly: 70
      watch_outs:
      - null count를 0으로 해석하지 말 것
      - 동일 raw_labels라도 페이지/관계가 다르면 즉시 병합하지 말 것
      - placeholder와 실제 설비를 혼동하지 말 것
      - 상태표현(기존/신설/본 공사 제외)은 클래스보다 속성 우선
      - self-loop relation은 내부 분기 annotation 가능성 고려
    for_0_9c_taxonomy:
      focus:
