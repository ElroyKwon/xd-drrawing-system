abbreviations:
  MDF: Main Distribution Frame
  FA: Floor Area
  OA: Office Area
  ITB: Intermediate Terminal Board
  AP: Access Point
  AMP: Amplifier
  J.B: Joint Box
  P.B: Pull Box
line_types:
- style: 실선
  meaning: 범례 표의 일반 심볼/배선 항목 표시
- style: 점선
  meaning: 주기사항/참조 관계 및 일부 배선 표기
- style: 화살표
  meaning: 전선관 입상, 통과, 입하 또는 홈런 방향 표시
- style: 대각선 조합선
  meaning: 전선관 Rise-up, Through and Down 표기
- style: 점선 타원형
  meaning: HAND HOLE FOR TEL 심볼
notes:
- '좌측 표 상단 제목: ''통합배선설비'', ''전관방송설비'', ''통합배선설비'', ''방송설비''가 보임. 출처: 페이지 3 좌측 범례 표.'
- '우측 표 상단 제목: ''공통사항''이 보임. 출처: 페이지 3 우측 범례 표.'
- '주기사항 본문에 ''모든 자재는 KS 또는 동등 이상의 제품을 사용'' 등 문장이 보이나, 범례/약어/선 종류가 아닌 일반 주기사항으로만 보고함.
  출처: 페이지 3 우측 하단 주기사항.'
- 일부 항목은 영문/한글 표기가 함께 보이며, 약어는 이미지에 직접 보이는 표기만 기재함.
- 시각적 근거는 페이지 3의 좌측/우측 범례 표와 표제란에 한정함.
