  raw_labels:
  - 주기사항
  - 1. 배관, 배선
  - 슬라브 매입 또는 천정 매입 배관 배선
  - 노출 배관 배선
  - 바닥 은폐 및 지중 매설 배관 배선
  - DUCT 또는 TRAY내 배선
  - 2. 통신용 배관, 배선
  - T - 16C (UTP 0.5mm/4Pr3, CAT.5e)
  - T - 22C (UTP 0.5mm/4Pr3, CAT.5e)
  - T - 28C (UTP 0.5mm/4Pr4, CAT.5e)
  - T - 28C (UTP 0.5mm/4Pr8, CAT.5e)
  - FO - 16C (FIBER OPTICAL S.M 2CORE)
  - CC - 16C (FIBER OPTICAL S.M 4CORE)
  - 3. LEGEND
  - LAN OUTLET 2PORT
  - SYSTEM BOX(LAN) 2PORT
  - SYSTEM BOX(LAN) 1PORT, (광) 1PORT
  - LAN OUTLET(TEL) 1PORT
  - 광 OUTLET
  - 무선 AP
  - CCTV
  - 전화 단자함(Intermediate Terminal Board)
  - PULL BOX SIZE 150 x 150 x 100mm
  - PULL BOX SIZE 200 x 200 x 150mm
  - PULL BOX SIZE 300 x 300 x 200mm
  - PULL BOX SIZE 400 x 400 x 300mm
  - 4. CABLE TRAY내 포설시 전선관을 제외한 CABLE만 포설한다
  - 5. CABLE TRAY 및 노출 배관 배선의 지지행거는 1,500mm마다 설치한다
  - 6. CABLE TRAY 내 접지선은 F-GV 16sq x 1을 사용한다
  - 7. 간선 규격 및 기타 사항은 계통도 참조
