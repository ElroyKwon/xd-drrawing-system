  - panel_id: P03_NOTES
    shape: rectangle
    labels_inside:
    - ■ 주기사항
    - 1. 모든 자재는 'KS' 또는 동등 이상의 제품을 사용하고, 관련법규를 준수하여 시공한다.
    - 2. 모든 전선관은 별도의 표기가 없는 한 HI-PVC 또는 CD 난연관을 사용한다.
    - 3. 본공사에 사용되는 전선관은 다음과 같다.
    - 1) 슬라브 매입배관은 HI-PVC 전선관을 사용한다.
    - 2) 슬라브에 매입되지 않는 부분은 아래와 같다.
    - - 노출배관: 난연성 CD, HI-PVC 또는 STEEL 전선관을 사용한다.
    - - 건식 벽체 매입배관: CD 난연관을 사용한다.
    - - 옥외전화 인입배관: HI-PVC 전선관을 사용한다.
    - 4. Cable Tray 내에서는 배관을 사용하지 않는다.
    - 5. 마감높이는 현장여건에 의하여 변경될 수 있다.
    - 6. 현장 여건상 또는 기타 사항으로 부득이 변경이 불가피할 경우에는 관계 법령의 테두리 내에서 시행한다.
    - 7. 모든설비는 시공을 위한 예시도면이며, 특히 각종 외형상세도는 납품업체에 따라 크기가 상이할 수 있다.
