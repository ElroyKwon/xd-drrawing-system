    - '      - 노출배관: 난연강 CD, HI-PVC 또는 STEEL 전선관을 사용한다.'
    - '      - 건식 벽체 매입배관: CD 난연관을 사용한다.'
    - '      - 옥외회로 간선배관: HI-PVC 전선관을 사용한다.'
    - 4. Cable Tray 내에서는 배관을 사용하지 않는다.
    - 5. 마감높이는 현장여건에 의하여 변경될 수 있다.
    - 6. 현장 여건상 또는 기타 사항으로 부득이 변경이 불가기미할 경우에는 관계 법령의 테두리 내에서 시행한다.
    - 7. 모든설비는 시공을 위한 예시도면이며, 특히 각종 외형상세도는 납품업체에 따라 크기가 상이할 수 있다.
