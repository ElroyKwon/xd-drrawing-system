        - note
        - cable_schedule
        - title_block
        - drawing_index
      expected_relation_patterns:
      - rack -> zone/room cable distribution
      - external source -> manhole/duct/tray -> rack/room
      - broadcast head-end/amplifier -> speaker terminal board -> speaker zones
      - legend/schedule -> equipment or route reference
      - space -> installed equipment symbols
      expected_data_density:
        high_fields:
        - raw_labels
        - labels_inside
        - position
        - equipment_symbols
        - inferred_name
        medium_fields:
        - shape
        - panel_id
        - dimensions
        - notes
        low_fields:
