        - mount_type
        - power
        - explosion_proof
      reasoning: 단일 discipline이지만 실제로는 데이터통신, 방송, 외부 인입, 문서 메타가 혼재한다. 따라서 후속 단계에서
        communication 내부 서브도메인 분리가 중요하다.
  merge_candidates_hint:
    likely_duplicates:
    - pattern: '동일 실체의 표기 변형: HUB-RACK-2 / RACK-HUB-2 / HUB RACK -2 (RACK TYPE)'
      estimate: 3~4건
      resolution_hint: 페이지/맥락별 동일 랙인지, 상세도와 계통도 표현 차이인지 확인 후 canonical rack individual
        + alias 처리
    - pattern: IDF-1 / RACK-IDF-1 / HUB-RACK-01과의 부분중첩
      estimate: 2~3건
      resolution_hint: 1층 통신실 랙, IDF 개념, 허브랙 개념이 동일 개체인지 상하위 구성인지 분리 검토
    - pattern: CABLE-SCHEDULE / META-CABLE-SCH
      estimate: 2건
      resolution_hint: 동일 표의 중복 추출 가능성이 높아 문서 엔티티 병합 우선
    - pattern: LEGEND-BOX / META-NOTES / NOTES-SECTION / NOTES-SECTION / NOTE-LEGEND
        / NOTE-SECTION / LEGEND-NOTE
      estimate: 6~8건
      resolution_hint: 페이지별 별도 범례인지 동일 유형 반복인지 구분하고, 개체 병합보다 공통 클래스 정리가 우선
    - pattern: MANHOLE-01 / MH-01 / MANHOLE-IC / ITB-CABINET(정보통신용 맨홀)
      estimate: 3~4건
      resolution_hint: 동일 위치 개체인지, 동일 타입의 다른 페이지 표현인지 source_page와 관계망으로 판별
    - pattern: PULL-BOX / PULL-BOX-MAIN / PB-01 / PULL-BOX-01 / 풀 박스 (P.B)
      estimate: 4~6건
      resolution_hint: 범례 심볼, 실제 설치 개체, 구역 집계 엔티티를 분리한 뒤 동일 설치점만 병합
    - pattern: TRAY-GONGDONG / CABLE-TRAY-MAIN / UNKNOWN-SPACE-01 / TUNNEL-DUCT-01
      estimate: 3~5건
      resolution_hint: 공동구 트레이라는 공통 개념 아래 실제 위치별 개체와 추상 경로를 분리
    - pattern: SHOWROOM / SHOW-ROOM, DRIVE-DEV-LAB / DRIVE-LAB, SPACE-SOFTLAB / SPACE-SoftwareLab
      estimate: 6건 내외
      resolution_hint: 통신 평면과 방송 평면의 동일 공간 가능성이 높으므로 공간 canonicalization 필요
    - pattern: EXT-SOURCE-* / EXT-* / ROUTE-TO-* / UNKNOWN-SPACE-03~05
      estimate: 8~12건
      resolution_hint: 외부 출처, 경로, 목적지 주석이 혼합되어 있으므로 source-point와 route-note를 분리
  ambiguity_risk_areas:
  - tag_pattern: type=BOUNDARY 또는 METADATA인데 실제 물리설비처럼 보이는 엔티티
    reason: EXT-DUCT, PULL-BOX, MANHOLE-IC, Without Conduit 등은 추출기 관점 type과 실제 도면
      의미가 다르다.
    recommended_handling: type보다 specs/relations/function_category 우선으로 재분류하고 원본 type은
      annotation으로 보존
  - tag_pattern: equipment/space 혼합 엔티티
    reason: COMM-ROOM-1F, PA-HEAD-END, BROADCAST-ROOM 등은 공간이면서 장비 설치 블록 역할도 한다.
    recommended_handling: 단일 개체로 둘지 공간+장비 복합 모델로 분해할지 다음 단계에서 판단하되, 정보 손실 방지를 위해 우선
      둘 다 기록
  - tag_pattern: 범례 심볼 엔티티 vs 실제 설치 개체
    reason: 천정형 스피커 (3W), Speaker Terminal Board, LAN OUTLET(OA) 2PORT는 범례 정의이고, UNKNOWN-SPEAKER-*,
      STB-S1, SYSBOX-*는 실제 배치다.
    recommended_handling: SymbolDefinition 클래스와 InstalledAsset 클래스를 분리
  - tag_pattern: 공간명 동일하지만 시스템별 표현이 다른 엔티티
    reason: SHOWROOM/SHOW-ROOM, Software Lab 관련 엔티티처럼 통신/방송 도면에서 동일 공간이 다른 장비를 가진다.
    recommended_handling: 공간 canonical entity를 만들고 시스템별 설비 관계를 별도 연결
  - tag_pattern: relation annotation 안의 케이블 규격 문자열
    reason: 실제 CableSpec 개체와 문자열 annotation이 혼재한다.
    recommended_handling: annotation 원문 보존 후 가능한 경우 cable_spec 개체와 링크
  - tag_pattern: unknown/placeholder/document cover 엔티티
