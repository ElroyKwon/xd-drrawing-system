      reasoning: 랙 내부 구성품 수가 랙마다 다르며 HUB-RACK-1/2는 다수 구성품을 가진다.
    - type: Cardinality
      target: CableSpec
      expected: at least one identifying spec among cableType/conductorCount/pairCount/category
      reasoning: 케이블 규격 엔티티는 최소 하나 이상의 규격 속성으로 식별된다.
    - type: DomainRange
