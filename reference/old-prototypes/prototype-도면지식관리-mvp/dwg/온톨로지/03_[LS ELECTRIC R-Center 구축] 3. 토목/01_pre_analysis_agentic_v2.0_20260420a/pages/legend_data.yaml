notes:
- 페이지 3 우측 하단 범례 표에서 확인되는 항목만 추출함.
- 범례 표의 항목 수는 15개로 보이며, 보이는 항목만 보고함.
- 도근점은 약어가 별도로 보이지 않아 abbreviation을 null로 둠.
- 가로등, 옹벽, 휀스, 콘크리트, 조경석은 범례 표의 시각 패턴을 기준으로 기술함.
