line_types:
- style: 실선 화살표
  meaning: 유체의 흐름방향
- style: 직선 배관선
  meaning: 배관 또는 덕트의 기본 연결선
- style: 꺾임/엘보 선형
  meaning: 배관 또는 덕트의 방향 전환
- style: 점선
  meaning: 범례 이미지에서 별도 의미 표기는 확인되지 않음
notes:
- 페이지 상단 제목은 '범례표'로 보임.
- 좌측은 DUCTS, 중앙은 UTILITY 및 SANITARY, 우측은 FITTINGS(STEEL), VALVES & OTHERS, ABBREVIATIONS로
  구성됨.
- 일부 심볼은 동일한 도형이 여러 항목에 반복 사용되어 시각적 형태가 유사하게 보임.
- ABBREVIATIONS 영역에는 SYMBOL / ABBREV. / DESCRIPTION 구조가 함께 보임.
- 페이지 하단 중앙에 원형 번호 '1'과 함께 '범례표' 표기가 보임.
