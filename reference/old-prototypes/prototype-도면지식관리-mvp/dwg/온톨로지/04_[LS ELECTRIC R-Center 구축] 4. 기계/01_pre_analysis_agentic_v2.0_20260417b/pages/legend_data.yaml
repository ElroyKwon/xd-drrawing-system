line_types:
- style: solid line
  meaning: 덕트/배관/연결선의 기본 선형 표현
  source:
    page: 3
    location: 범례 전반
- style: dashed line
  meaning: 도면 내 일부 연결 또는 참조선 표현
  source:
    page: 3
    location: 범례 및 시각적 표기
- style: arrow line
  meaning: 유체 흐름 방향
  source:
    page: 3
    location: DUCTS 섹션
- style: double-dot line
  meaning: SANITARY 섹션의 배관 표기 중 하나로 보이는 선형 표현
  source:
    page: 3
    location: SANITARY 섹션
- style: single-dot line
  meaning: SANITARY 섹션의 배관 표기 중 하나로 보이는 선형 표현
  source:
    page: 3
    location: SANITARY 섹션
notes:
- 페이지 상단 제목은 '범례 표'이며, 우측 표제란에 도면번호 M03-001이 보인다.
- DUCTS, UTILITY, FITTINGS(STEEL), SANITARY, VALVES & OTHERS, ABBREVIATIONS 섹션이 시각적으로
  확인된다.
- '동일 약어가 서로 다른 의미로 보이는 항목이 있다: FD는 Fire Damper와 Floor Drain 모두에 사용됨.'
- '동일 심볼/항목이 반복 표기된 것으로 보이는 항목이 있다: Expansion Joint.'
- 시각적으로 확인되지 않거나 판독이 불명확한 항목은 null 또는 UNKNOWN으로 유지했다.
