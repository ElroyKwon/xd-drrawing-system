    notes:
    - SMFD 심볼은 벽체에 설치된 작은 직사각형 형태로 표기됨.
    - 모든 SMFD는 CV 2.5x3C(전원) 및 UTP 0.6x4P(신호) 케이블로 연결됨.
    - 케이블은 각 실의 SMFD를 직렬로 연결하는 루프 배선 방식으로 보임.
    - 전기차충전실 구역은 점선 박스로 구획되어 있으며 다수의 SMFD가 설치됨.
    - 중앙 코어(계단실, PS/TPS) 주변에도 SMFD가 배치되어 있음.
    - 공동구로 연결되는 배선이 우측 하단에 표기됨.
