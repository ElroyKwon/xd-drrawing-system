notes:
- 페이지 3은 '범례표'이며, 덕트, 유틸리티, 피팅(강관), 위생배관, 밸브/기타, 약어가 함께 수록되어 있음.
- 같은 약어가 서로 다른 섹션에서 다른 의미로 보이는 경우, 보이는 표기만 그대로 병기함.
- '예: FD는 DUCTS 섹션에서는 FIRE DAMPER, FITTINGS(STEEL) 섹션에서는 FLOOR DRAIN으로 보임.'
- '예: A는 UTILITY 섹션에서는 COMPRESSED AIR SUPPLY로 보임.'
- '예: M은 VALVES & OTHERS 섹션에서 FLOW METER로 보임.'
- 페이지 하단 표제란에는 도면번호 M03-001이 보임.
