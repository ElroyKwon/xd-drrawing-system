notes:
- 페이지 3은 범례표이며, 상단 제목은 '범례표'로 보인다.
- 도면번호는 M03-001로 보인다.
- UTILITY 섹션 제목에는 'KSD - 3576 MATERIAL'이 함께 표기되어 있다.
- FITTINGS(STEEL) 섹션과 VALVES & OTHERS 섹션의 일부 심볼은 동일한 약어가 다른 의미로 반복될 수 있어, 표기 그대로 분리해
  기록했다.
- 이미지에서 확인되는 항목만 기록했으며, 판독이 불명확한 항목은 null로 두었다.
