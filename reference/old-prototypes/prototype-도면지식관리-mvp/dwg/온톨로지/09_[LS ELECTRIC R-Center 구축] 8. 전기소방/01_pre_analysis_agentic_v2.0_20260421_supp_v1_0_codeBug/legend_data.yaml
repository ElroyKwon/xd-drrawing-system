notes:
- '주기사항 1: 각 소방 설비 배선중 표기없는 매입 전선관은 HI-PVC 전선관 또는 난연성 CD전선관을 사용함.'
- '주기사항 2: 난연성 CD전선관은 사양참조. 단, 노출부분은 아연도 철제후강전선관을 사용.'
- '주기사항 3: 배관용 금속은 용융 아연도금 제품을 사용하여야 한다.'
- 경보설비, 소화활동설비, 피난설비, 공통설비의 구분이 표에 보임.
- 배관 배선 및 주기사항 표와 주기사항 표가 함께 존재함.
