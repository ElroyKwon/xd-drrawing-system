  - 각 경보단락방호장치를 설치하거나 감지, 경보공사단선 방법으로 배관통신선 방법으로 연결도록 한다.
  - 전선은 소방시설공사에 적합한것을 사용한다.
  - 전선분수는 제시사의 시스템에 따라 변경될 수 있다.
  - 모든 소방간선 케이블에서 매입시 TRAY로, 간선 연결시 F-FR-8 CABLE을 사용토록 한다. (HFIX, HFIX 내화내열선성 성능 충족할
    것.)
  - 노출 배관 공사시에는 STEEL 배관으로 시공 할수 있도록 한다.
