notes:
- 좌측 범례 표의 구분 항목은 경보설비, 소화활동설비, 피난설비, 공통설비로 보임.
- 우측 범례 표의 구분 항목은 감지기용 배관 배선, 유도등용 배관 배선, 비상조명 배관 배선, 주기사항으로 보임.
- '주기사항 영역에는 3개 문장이 보임: ''각 소방 설비 배선중 표기없는 매입 전선관은 HI-PVC 전선관 또는 난연성 CD전선관을 사용함(단,
  노출부분은 아연도 칠피복전선관을 사용)'', ''배관용 금구는 용융 아연도금 제품을 사용하여야 한다.'''
- 주기사항 영역의 첫 문장은 화면에서 일부만 선명하게 보이며, 완전한 문구는 일부 판독 불가.
- 페이지 우측 표제란에 EF-001, 202401, R-Center, 소방범례 및 주기사항이 보임.
