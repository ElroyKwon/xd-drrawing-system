notes:
- 경보설비, 소화활동설비, 피난설비, 공통설비, 감지기용 배관 배선, 유도등용 배관 배선, 비상조명 배관 배선, 주기사항이 페이지에 보임.
- '주기사항에는 3개 항목이 보임: 1) 각 소방설비 배선용 표기선은 매입 전선관은 HI-PVC 전선관 또는 난연성 CD전선관을 사용함. 2) 난연성
  CD전선관은 사양참조(단, 노출부분은 아연도 질피주강전선관을 사용). 3) 배관용 금구는 용융 아연도금 제품을 사용하여야 한다.'
- 우측 상단 배관 배선 표에는 16C(HFIX 2-1.5㎟), 16C(HFIX 4-1.5㎟), 22C(HFIX 8-1.5㎟), 16C(HFIX 2-2.5㎟),
  16C(HFIX 2.5㎟ x 2 E-2.5㎟)가 보임.
- 좌측 하단 공통설비 표에는 PULL BOX, 유도등/비상콘센트 전원 공급용 분전반, 감지기용 배관배선, 유도등용 배관배선, 전정 SLAB 매입
  배관배선, 바닥 SLAB 매입 배관배선, 지중 매입 배관배선, 천정 노출 및 은폐 배관배선, 분전반 및 단자반으로 향하는 귀로, 전선관 입상/입하/등
  화표시가 보임.
