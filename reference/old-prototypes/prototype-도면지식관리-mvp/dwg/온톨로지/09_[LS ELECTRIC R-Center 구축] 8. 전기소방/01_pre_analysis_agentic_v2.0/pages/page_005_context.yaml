    - 전선은 소방시설공사에 적합한것을 사용한다.
    - 전선분수는 계획사의 시스템에 따라 변경될 수 있다.
    - 모든 소방간선 케이블은 트레이(TRAY)내 포설시 F-FR-8 CABLE을 사용토록 한다. (NFSC, WFTC 내화/내열배선 성능 충족할
      것.)
    - 자동화재탐지설비의 수신기는 화재로 인하여 하나의 층의 지구음향장치의 배선이 단락되어도 다른 층의 화재통보에 지장이 없도록 배선한다.
    - 각 경보단락보호장치를 설치하거나 감지, 경보공통선을 별개로 배선하여 연결토록한다.
