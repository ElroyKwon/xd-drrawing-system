notes:
- 페이지 상단 중앙에 '범례' 제목이 보임.
- 범례 표의 열 제목은 '기호', '기호명', '비고'로 보임.
- 하단에 '장비일람표'가 별도로 존재하지만, 본 요청은 범례 이미지의 심볼/약어/선 종류 추출로 해석하여 범례 표 중심으로 구조화함.
- 범례 표 하단 주기 문구는 일부 판독 가능하나, 전체 문장은 명확히 읽히지 않아 null로 둠.
- 페이지 3에서 확인되는 심볼 수는 13개.
