line_types:
- style: 실선
  meaning: 범례 표의 각 기호 행에서 사용된 기본 배관/기호 표시 선
  source:
    page: 3
    visual_evidence: 범례 표 기호 열 전반
- style: 점선/사선 혼합 표기
  meaning: 범례 표 하단 주기에서 배관부속 적용 조건을 구분하는 표기
  source:
    page: 3
    visual_evidence: '범례 표 하단 주기: ''배관부속'', ''관보온'' 관련 문구'
- style: 해당 없음
  meaning: null
  source:
    page: 3
    visual_evidence: 페이지 내 별도 선종류 범례는 확인되지 않음
notes:
- 범례 표 상단 제목은 '범례'로 보임.
- 페이지 하단에는 '장비일람표'가 함께 있음.
- 장비일람표의 항목(FF-1, FF-2, FT-1)은 범례가 아니라 장비 식별자이므로 symbols에 포함하지 않음.
- 범례 표 하단 주기에는 배관부속 및 관보온 관련 조건 문구가 보이나, 선 종류를 명시적으로 구분하는 별도 범례는 확인되지 않음.
- 페이지 3에서 확인 가능한 심볼은 위 13개뿐임.
