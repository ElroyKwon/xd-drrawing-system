line_types:
- style: 실선 배관 기호
  meaning: 범례 표의 각 설비/배관 심볼을 나타내는 기본 선형 기호
  source:
    page: 3
    visual_evidence: 범례 표의 기호 칸에 반복적으로 표시된 선형 심볼
- style: 배관 부속 심볼 포함 선형
  meaning: 게이트밸브, 체크밸브, 스트레이너, 여과망, 후렉시블 조인트 등 배관 부속을 나타내는 선형 기호
  source:
    page: 3
    visual_evidence: 범례 표 중간 행들의 기호 칸
- style: 원형 소화기 심볼
  meaning: A.B.C 분말소화기, K급소화기 표시에 사용된 원형 기호
  source:
    page: 3
    visual_evidence: 범례 표 하단의 소화기 항목 기호 칸
- style: 표제란/장비일람표 구분선
  meaning: 범례 표와 장비일람표를 구획하는 표 형식의 선
  source:
    page: 3
    visual_evidence: 페이지 중앙 범례 표 및 하단 장비일람표의 테두리/격자선
notes:
- '페이지 상단 중앙에 ''범례'' 표가 있음. source: page 3, visual evidence: 상단 중앙 배너 제목 ''범례'''
- '범례 표의 열 제목은 ''기호 / 기호명 / 비고''로 보임. source: page 3, visual evidence: 범례 표 상단 헤더'
- '범례 표 하단에 주기 2줄이 있음. source: page 3, visual evidence: 범례 표 하단 각주'
- '주기 내용: ''배관부속 : 50ø이하 그루브조인트, 65ø이상(그루브조인트)''로 보임. source: page 3, visual evidence:
  범례 표 하단 첫 줄'
- '주기 내용: ''관보온 : 80ø이하(25t 가교발포폴리에틸렌+마직테이프), 100ø이상(40t 가교발포폴리에틸렌+마직테이프)''로 보임. source:
  page 3, visual evidence: 범례 표 하단 둘째 줄'
- '하단에는 ''장비일람표''가 별도로 있으며 펌프와 탱크 항목이 함께 배치됨. source: page 3, visual evidence: 페이지
  하단 중앙의 ''장비일람표'' 및 표'
