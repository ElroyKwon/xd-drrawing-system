    - 1. 도면에 설계된 재료(시스템 규격등)본 설계 도서 및 동등 이상의 제품으로 사용가능함.
    - 2. 설계 도면과 상이한 경우에는 현장여건에 맞게 시공하되 감독관의 승인을 득할 것.
    - 3. 기존 장비 및 기구류는 파손이 되지 않게 주의하여 철거후 재설치 할 것.
    - 4. 발주처의 요구에 의해 경미한 변경이 있을 수 있으며, 그에 따른 물량등의 변경이 있을경우 감독관의 승인을 득한 후 시공할 것.
    - 5. 배관 지지 철물은 기존 재사용.
    - 6. 범례
    - 신설 배관 (실선)
    - 기존 배관 (점선)
    - '7. 기존배관 재질 : 백강관'
    - 8. 동파우려가 있는 배관은 동파방지열선 설치후 보온 한다.
    - 9. 기존 소화용펌프(UT층)는 변경 없음.
