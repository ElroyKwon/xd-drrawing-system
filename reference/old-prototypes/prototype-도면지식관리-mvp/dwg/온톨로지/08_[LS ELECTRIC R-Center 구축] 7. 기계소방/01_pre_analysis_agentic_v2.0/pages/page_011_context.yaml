  - tag: NOTES-LEGEND
    name: 주기 및 범례
    discipline: FIRE_PROTECTION
    function_category: LEGEND
    specifications:
      labels_inside:
      - ■ 주 기
      - 1. 도면의 설계된 재료(시스템 범위)는 신기 재료 또는 동등 이상의 재료로 시공한다.
      - 2. 설계 도면이 상이한 곳 무에는 현장관리인 및 시공사의 감독관의 승인을 득할 것.
      - 3. 기존 장비 및 기구류는 파손이 되지 않게 주의하여 철거 후 재설치 할 것.
      - 4. 발주자의 요구에 의해 변경이 있을 경우 관련이 있을 수 있으며, 그에 따른 물량표 변경이 발생하여 입주자의 승인을 득한 후 시공한다.
      - 5. 배관 및 기 철물은 기존 세시공.
      - 6. 범례
      - 신설 배관 (실선)
      - 기존 배관 (점선)
      - '7. 기존배관 자재 : 백강관'
      - 8. 플라우커가 있는 배관 플라밍자선설 실시 후 임통보한 한다.
      - 9. 기존 스윙형밸브(IT등)는 변경 없음.
      labels_above: []
      labels_below: []
      inferred_name: 주기 및 범례 (신설/기존 배관 선종 구분)
      position: top-right
