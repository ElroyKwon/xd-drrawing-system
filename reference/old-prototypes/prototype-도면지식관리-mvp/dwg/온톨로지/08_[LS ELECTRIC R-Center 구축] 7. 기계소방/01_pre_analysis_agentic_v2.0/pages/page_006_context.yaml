      - 3. 기존 장비 및 기구류는 파손이 되지 않게 주의있게 취급하여 재설치 할 것.
      - 4. 설주치의 오구에 비해 경기한 변경이 있을 수 있으며, 그에 따른 물량의 변경이 발생하여 감독관과 협의한 후 시공할 것.
      - 5. 배관 위치 철물은 기존 세시공.
      - 6. 범례
      - 신설 배관 (실선)
      - 기존 배관 (점선)
      - '7. 기존배관 재질 : 백강관'
      - 8. 통과우려가 있는 배관은 통과방지배선 설치후 임통보한 한다.
      - 9. 기존 스임용품은(IT등)는 변경 없음.
