  - tag: NOTES-BLOCK
    name: 주기(Notes) 블록
    discipline: FIRE_PROTECTION
    function_category: NOTES
    specifications:
      shape: rectangle
      labels_inside:
      - ■ 주 기
      - 1. 도면에 설계된 제품(시스템 포함)은 성기 표준 또는 동등 이상의 제품으로 사용가능.
      - 2. 붙게 도면이 상이한 곳 부위에는 현장여건에 맞게 시공하며 감독관의 승인을 득할 것.
      - 3. 기존 장비 및 기구류는 최소의 위치 및 규격 주의하여 철거 후 재설치 할 것.
      - 4. 밸브류의 오구에 비례 설치기한 판단이 있을 수 있으며, 그에 따른 물량들과 연관이 있으므로 오구적인 오구적인 승인을 득한 후 시공할
        것.
      - 5. 배관 위치 철물은 기존 세시공.
      - 6. 범례
      - 신설 배관 (실선)
      - 기존 배관 (점선)
      - '7. 기존배관 자재 : 백강관'
      - 8. 통과우려가 있는 배관 통과방화선 설치후 감독보완 한다.
      - 9. 기존 소방용품은(IT등)는 변경 없음.
      labels_above: []
      labels_below: []
    position: top-right
