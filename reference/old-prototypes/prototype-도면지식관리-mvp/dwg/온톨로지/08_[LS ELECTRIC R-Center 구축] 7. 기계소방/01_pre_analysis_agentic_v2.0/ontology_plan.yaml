        PartOf: 18
        ObjectPropertyAssertion: 55
        DataPropertyValue: 30
        AnnotationOnly: 52
      watch_outs:
      - count가 있는 범례 엔티티를 실제 설비 개체 수만큼 자동 증식하지 말 것
      - raw_labels가 동일한 BRACE 태그를 성급히 별개 개체로 확정하지 말 것
      - 도면영역(FLOOR-2F 등)과 실제 층 공간을 혼동하지 말 것
      - 관계의 pipe와 connects_to를 동일시하지 말고 둘 다 보존
    for_0_9c_taxonomy:
