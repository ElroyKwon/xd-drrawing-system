      resolution_hint: 실제 설비 개체, 그룹 표현, 범례 심볼, 상세도, 위치별 별칭을 분리한 뒤 동일 설비군 클래스 아래 정규화.
    - pattern: 연결송수구 계열 FDC-001 / FDC-01 / FDC-LEGEND / FDC-CONNECTION / PIPE-CONNECT-ANNOTATION
        / DET-03 / UNKNOWN-DETAIL-03
      estimate: 6~8건
      resolution_hint: 실제 설비, 범례, 주석, 상세도, 외부배관 연결 표현을 분리하고 동일 equipment family로 연결.
    - pattern: ABC 소화기 계열 ABC-EXTINGUISHER / FE-01~18 / UNKNOWN-EQUIP-02 / SYM-009
      estimate: 20~22건
      resolution_hint: 개별 배치 개체와 범례/심볼/집계 엔티티를 분리. count 기반 그룹 표현 여부 확인.
    - pattern: 내진 버팀대 태그 BRACE-H-17~37 vs BRACE-H-H-01~05, BRACE-L-20~28 vs BRACE-LONG-01~02
      estimate: 10~18건
      resolution_hint: '동일 라벨(예: 2층 H-H-횡17)이 중복 태그로 존재하므로 라벨 기준 병합 후보로 관리.'
    - pattern: 도면영역/평면도 FLOOR-2F / FLOOR-PLAN-AREA / UNKNOWN-SPACE-13 / FLOOR_PLAN_AREA
        / UNKNOWN-PANEL-1
      estimate: 4~6건
      resolution_hint: 실제 도면 패널, 도면영역, 층 공간, 제목 메타데이터를 구분 후 필요시 same drawing context로
        연결.
    - pattern: 주기/범례 NOTES-BOX / NOTES_BOX / SPACE-NOTE-001 / UNKNOWN-PANEL-4
      estimate: 4~5건
      resolution_hint: GeneralNote와 LegendSection을 분리하고 페이지별 개체로 둘지 공통 템플릿으로 둘지 판단.
    - pattern: 표제란 TITLE-BLOCK-001 / TITLE-BLOCK-002 / TITLE-BLOCK-SKETCH / SPACE-TITLE-001
        / MF-102 / UNKNOWN-PANEL-5 / ENGINEER-BLOCK
      estimate: 6~8건
      resolution_hint: 표제란 본체, 설계사 블록, 스케치 수준 엔티티를 분리. drawing_number 기준 정규화.
    - pattern: PIT 공간 PIT-001 / SPACE-19 / SPACE-PIT-001(관계에서만 등장)
      estimate: 2~3건
      resolution_hint: 명시 엔티티와 관계 전용 참조명을 통합 후보로 관리.
    - pattern: 입상관 RISER-01~07 vs RISER-TL/TC/TR/BC 계열
      estimate: 5~10건
      resolution_hint: page 13의 위치기반 riser 태그가 page 5의 번호기반 riser와 동일한지 라벨/위치/직경으로
        대조.
    - pattern: Drive 시험실 계열 ROOM-drive-시험실 / ROOM-drive-기동시험실 / SPACE-17 / SPACE-18
      estimate: 3~4건
      resolution_hint: 실제 서로 다른 실인지 OCR 변형인지 페이지별 공간 대응 검토.
  ambiguity_risk_areas:
  - tag_pattern: BRACE-H-* / BRACE-H-H-* / BRACE-L-* / BRACE-LONG-*
    reason: 동일 raw_labels를 가진 태그가 복수 존재하며 suggested_parent_class도 IdentificationTag,
      SeismicBrace, SeismicBracingComponent 등으로 혼재.
    recommended_handling: 다음 단계에서 raw_labels 우선, 실제 물리 버팀대 vs 식별태그를 분리하고 중복 라벨 병합
      여부를 판정.
  - tag_pattern: FHC-*
    reason: 실제 설비, 그룹, 위치별 별칭, 층별 개체, 범례 심볼, 상세도가 모두 혼재.
    recommended_handling: equipment instance / equipment family / legend symbol /
      detail drawing 네 층위로 분리.
  - tag_pattern: FDC-* / PIPE-CONNECT-ANNOTATION
    reason: 실제 연결송수구와 연결 주석, 상세도, 범례가 혼재.
    recommended_handling: 실체 설비와 annotation/document entity를 엄격히 분리.
  - tag_pattern: TITLE-BLOCK* / MF-* / COVER-* / ENGINEER-BLOCK
    reason: 표제란, 도면번호, 설계사 블록, 커버 정보가 서로 중첩.
    recommended_handling: DocumentEntity 내부에서 CoverPage, TitleBlock, DrawingIndex,
      EngineerInfoBlock으로 세분.
  - tag_pattern: UNKNOWN-*
    reason: 합성 엔티티가 다수이며 confidence가 낮거나 중복 가능성이 큼.
    recommended_handling: 정규 엔티티와 매칭 가능한지 우선 확인 후, 불가하면 보조/임시 개체로 유지.
  - tag_pattern: COVERAGE-CIRCLE-SEISMIC / UNKNOWN-SHAPE-01
    reason: 보조선으로 명시되지만 suggested_parent_class는 CoverageArea/Guide로 제안됨.
    recommended_handling: 물리 설비로 승격하지 말고 Annotation/Guide 계열 후보로 유지.
  - tag_pattern: MF
    reason: 원형 시스템 마커이나 function_candidates가 경보설비 쪽으로 흔들림.
    recommended_handling: 외부 지식 없이 현재 관찰만으로는 SystemMarker 수준에 보수적으로 유지.
  - tag_pattern: SYM-009~012
    reason: name와 abbreviation/visual_description가 서로 어긋나는 OCR/행 밀림 흔적 존재.
    recommended_handling: 범례 표의 행 순서를 재검증하여 심볼-설명 매핑을 수정 후보로 관리.
  - tag_pattern: SPACE/PIT/FLOOR_PLAN_AREA 계열
    reason: 실제 공간, 도면영역, 층 전체 영역이 모두 SPACE 또는 DRAWING_AREA로 혼재.
    recommended_handling: SpatialEntity와 DrawingArea를 분리하고 관계로 연결.
  - tag_pattern: RISER-01~07 vs RISER-H-01~08 vs RISER-DN/UP/CN-*
    reason: 모두 입상관이지만 페이지별 표현 수준과 역할이 다름.
    recommended_handling: 공통 상위 Riser를 두고 계통도용/평면도용/위치기반 표현을 하위 또는 표현 개체로 분리.
  guidance_for_next_steps:
    for_0_9b_placement:
      focus:
      - 문서 엔티티와 물리 엔티티를 먼저 분리
      - 배관/입상관/설비/공간/내진태그의 5대 군집 배치
      - 범례/상세/주석/스케줄은 Annotation/Document 쪽으로 우선 배치
      - UNKNOWN-*는 정규 태그와 매칭 가능성 우선 검토
      expected_owl_role_distribution:
