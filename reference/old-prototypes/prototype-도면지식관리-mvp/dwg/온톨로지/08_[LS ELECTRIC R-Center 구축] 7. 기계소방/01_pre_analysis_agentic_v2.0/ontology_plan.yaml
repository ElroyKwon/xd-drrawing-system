  confidence: 0.82
  self_assessment: 전체 관찰을 기반으로 구조적 청사진은 비교적 선명하지만, 동일 라벨 중복(BRACE/FHC/RISER)과 UNKNOWN
    계열 합성 엔티티 때문에 개체 병합 경계는 아직 불확실하다. 특히 도면영역과 실제 공간, 실제 설비와 범례/상세/주석의 분리가 다음 단계 정확도를
