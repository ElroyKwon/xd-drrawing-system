specs:
  labels_inside:
  - ■ 주 기
  - 1. 도면에 설계된 제품[시스템 파이프]은 당기 표준 또는 동등 이상의 제품으로 사용가능함.
  - 2. 본 도면이 상이한 곳 무에는 현장여건에 맞게 시공하며 감독관의 승인을 득할 것.
  - 3. 기존 장비 및 기구류는 표준의 위치 맞게 주석있게 철거후 재설치 할 것.
  - 4. 발주자의 요구에 의해 설계기한 변경이 있을 수 있으며, 그에 따른 물량표 변경이 있을수도 있으므로 감독관 및 현장에 충분히 통보 후 시공할
    것.
  raw_labels:
  - ■ 주 기
  - 1. 도면의 설계된 재료(시스템 범위)는 신기 재료 또는 동등 이상의 재료로 사용이 됨
  - 2. 붉게 도면이 칠한 곳 무에는 현장여건에 맞게 시공하며 관련의 승인을 득할 것
  - 3. 기존 장비 및 기구류는 되도록 되시 않게 주의하여 철거후 재설치 할 것
  - 4. 납주시도 온국에 비해 경기한 반경이 있을 수 있으며, 그에 따른 물량들과 연관이 있을하우 있으므로 승인들을 득한 후 시공할 것
  - 5. 배관 및 지 철물은 기존 재사용
  - '6. 범례: 신설 배관(실선), 기존 배관(점선)'
  - '7. 기존배관 재질: 백강관'
  - 8. 통과우려가 있는 배관은 통과방지배선 실시후 임통보한 한다
  - 9. 기존 소방용품은(IT등)는 반경 없음
  - 1. 도면에 설치된 제품(시스템 공법등)은 상기 제품 또는 동등 이상의 제품으로 사용가능함.
  - 2. 설계 도면과 상이한 경우에는 현장여건에 맞게 시공하되 감독관의 승인을 득할 것.
  - 3. 기존 장비 및 기구류는 파손이 되지 않게 주의있게 철거후 재설치 할 것.
  - 4. 발주처의 요구에 의해 경미한 변경이 있을 수 있으며, 그에 따른 물량등의 변경이 있을경우 감독관의 승인을 득한 후 시공할 것.
  - 5. 배관 지지 철물은 기존 재사용.
  - 6. 범례
  - '   ─ 신설 배관'
  - '   --- 기존 배관'
  - '{''7. 기존배관 재질'': ''백강관''}'
  - 8. 동파우려가 있는 배관은 동파방지열선 설치후 보온 한다.
  - 9. 기존 소화용펌프(UT등)는 변경 없음.
  - 1. 도면에 설계된 제품[시스템 관련품]은 성기 표준 또는 동등 이상의 제품으로(A종 21형)
