line_types:
- style: 실선 배관
  meaning: 범례 표의 각 기호 행에서 배관/설비 심볼을 표시하는 기본 선
  source:
    page: 3
    evidence: 범례 표 기호 칸의 선형 심볼
- style: 점선/해칭 없음
  meaning: 이 페이지의 범례 표에서는 별도 선종류 설명이 확인되지 않음
  source:
    page: 3
    evidence: 범례 표 및 하단 주기 영역 전체
notes:
- 페이지 상단 제목은 '범례'이며, 하단에는 '장비일람표'가 함께 있음.
- '범례 표 하단 주기에는 배관부속 관련 조건이 2개 보임: ''배관부속 : 50ø이하 그루브조인트, 65ø이상(그루브조인트)''와 ''관보온 :
  80ø이하(25t 가교발포폴리에틸렌+마직테이프), 100ø이상(40t 가교발포폴리에틸렌+마직테이프)'''
- 장비일람표에는 FP-1, FP-2, FT-1이 보이나, 이는 범례의 심볼/약어 목록과 별도 표이므로 symbols에는 포함하지 않음.
